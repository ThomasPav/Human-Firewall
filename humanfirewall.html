<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Human Firewall</title>
<style>
:root{
  --ink:#0b1623; --panel:#13243a; --panel2:#0f1d30; --line:#21364f;
  --text:#e7eef7; --muted:#8ea4c0; --accent:#4d8df0;
  --good:#34b36a; --bad:#e0564f; --warn:#e6a93c;
  --display: system-ui,"Segoe UI","Helvetica Neue",Arial,sans-serif;
  --mono: ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:radial-gradient(1200px 700px at 70% -10%,#16294180,transparent 60%),var(--ink);
  color:var(--text); font-family:var(--display);
  -webkit-font-smoothing:antialiased; line-height:1.5;
  min-height:100%;
}
button{font-family:inherit;color:inherit;cursor:pointer}
.wrap{max-width:760px;margin:0 auto;padding:18px 18px 40px;min-height:100vh;display:flex;flex-direction:column}
.mono{font-family:var(--mono);letter-spacing:.04em}

/* top bar */
.topbar{display:flex;align-items:center;gap:12px;padding:6px 2px 14px}
.brand{font-weight:800;letter-spacing:-.01em;font-size:15px}
.brand .fw{color:var(--accent)}
.pill{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);
  padding:3px 9px;border-radius:999px}
.counter{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
.counter b{color:var(--text)}
.quitbtn{font-size:11px;color:var(--muted);border:1px solid var(--line);background:transparent;padding:4px 10px;border-radius:999px;cursor:pointer;transition:border-color .15s,color .15s,background .15s}
.quitbtn:hover{border-color:var(--bad);color:var(--bad);background:#2a1417}

/* meter HUD */
.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.meter{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px 10px}
.meter .top{display:flex;justify-content:space-between;align-items:baseline}
.meter .nm{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.08em}
.meter .val{font-family:var(--mono);font-size:17px;font-weight:600;font-variant-numeric:tabular-nums}
.meter .max{font-size:10px;color:var(--muted)}
.track{height:6px;background:#0a1626;border-radius:99px;margin-top:8px;overflow:hidden;border:1px solid #0c1b2e}
.fill{height:100%;width:50%;border-radius:99px;transition:width .6s cubic-bezier(.2,.7,.2,1),background .3s}
.fill.good{background:linear-gradient(90deg,#2a8f57,var(--good))}
.fill.warn{background:linear-gradient(90deg,#c08a2a,var(--warn))}
.fill.bad{background:linear-gradient(90deg,#b63f3a,var(--bad))}
.meter.flash{animation:flash .6s ease}
@keyframes flash{0%{border-color:var(--accent)}100%{border-color:var(--line)}}

/* generic card */
.stage{flex:1;display:flex;flex-direction:column;justify-content:center}
.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
  border-radius:18px;padding:22px;animation:rise .45s cubic-bezier(.2,.7,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

/* start */
.hero{text-align:center;padding:14px 6px}
.hero h1{font-size:clamp(38px,9vw,62px);font-weight:800;letter-spacing:-.02em;margin:14px 0 6px;line-height:.98}
.hero h1 .fw{color:var(--accent)}
.hero .sub{color:var(--muted);font-size:16px;max-width:440px;margin:0 auto 26px}
.modes{display:grid;gap:12px;max-width:430px;margin:0 auto}
.modebtn{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:16px 18px;transition:border-color .2s,transform .12s,background .2s;display:flex;gap:14px;align-items:center}
.modebtn:hover{border-color:var(--accent);background:#16294a}
.modebtn:active{transform:translateY(1px)}
.modebtn .ic{font-family:var(--mono);font-weight:700;color:var(--accent);font-size:18px;
  width:38px;height:38px;flex:0 0 38px;display:grid;place-items:center;border:1px solid var(--line);border-radius:10px;background:#0d1c30}
.modebtn .t{font-weight:700;font-size:16px}
.modebtn .d{color:var(--muted);font-size:13px}
.legend{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:26px;
  font-family:var(--mono);font-size:11px;color:var(--muted)}
.legend span b{color:var(--text)}

/* scenario */
.tag{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:#fff;padding:4px 10px;border-radius:7px;font-weight:700}
.targets{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em;margin:14px 0 4px;text-transform:uppercase}
.scenario-title{font-size:clamp(22px,5vw,30px);font-weight:800;letter-spacing:-.01em;margin:0 0 12px;line-height:1.08}
.scenario-text{font-size:17px;color:#d6e1f0}
.prompt{margin:16px 0 4px;color:var(--muted);font-style:italic}
.decisions{display:grid;gap:8px;margin-top:16px}
.dec{display:flex;align-items:center;gap:13px;text-align:left;background:var(--panel);
  border:1px solid var(--line);border-left:4px solid var(--dc,#4d8df0);border-radius:11px;
  padding:12px 14px;transition:border-color .15s,background .15s,transform .1s}
.dec:hover{background:#16294a;border-color:var(--dc)}
.dec:active{transform:translateY(1px)}
.dec .k{font-family:var(--mono);font-size:11px;color:var(--muted);width:14px;text-align:center}
.dec .nm{font-weight:800;font-size:15px;letter-spacing:.02em;width:96px;flex:0 0 96px;color:var(--dc)}
.dec .mn{color:var(--muted);font-size:13px}

/* outcome */
.chosen{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.chosen b{color:var(--dc,#fff)}
.vtag{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;padding:4px 11px;border-radius:7px;margin-bottom:12px}
.vtag.mal{background:#3a1715;color:#ef8a83;border:1px solid #5a2420}
.vtag.leg{background:#10301f;color:#67d49a;border:1px solid #1d5234}
.vtag.amb{background:#2e2611;color:#e6c265;border:1px solid #5a4a1c}
.outcome-text{font-size:18px;margin:10px 0 14px}
.deltas{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.delta{font-family:var(--mono);font-size:12px;font-weight:700;padding:4px 9px;border-radius:7px}
.delta.good{background:#11331f;color:#62d195;border:1px solid #1c5232}
.delta.bad{background:#3a1715;color:#ef8a83;border:1px solid #5a2420}
.delta.flat{background:#16202e;color:var(--muted);border:1px solid var(--line)}
.note{border-radius:11px;padding:12px 14px;font-size:14px;margin-top:8px}
.note.best{background:#10301f;border:1px solid #1d5234}
.note.best b{color:#67d49a}
.note.learn{background:#2e2611;border:1px solid #5a4a1c;margin-top:9px}
.note.learn b{color:#e6c265}
.note.penalty{background:#36161a;border:1px solid #6a2730;margin-bottom:10px}
.note.penalty b{color:var(--bad)}

/* actions */
.actions{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;text-align:center;border-radius:12px;padding:14px;font-weight:700;font-size:15px;border:1px solid var(--line);background:var(--panel);transition:.15s}
.btn:hover{border-color:var(--accent);background:#16294a}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#06101f}
.btn.primary:hover{background:#6aa1f4}
.btn.ghost{flex:0 0 auto;color:var(--muted)}

/* facilitator extras */
.fac-tools{display:flex;gap:10px;margin-top:14px}
.fac-tools .btn{flex:0 0 auto;font-size:13px;padding:10px 14px;color:var(--muted)}
.event-pop{margin-top:14px;background:#1a2236;border:1px solid #3a4a2e;border-left:4px solid var(--warn);border-radius:11px;padding:13px 15px}
.event-pop .et{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--warn);text-transform:uppercase}
.event-pop .en{font-weight:800;margin:3px 0 5px;font-size:16px}
.event-pop .ex{font-size:14px;color:#d6e1f0}
.event-pop .ea{margin-top:10px}

/* end */
.verdict{text-align:center;padding:6px}
.verdict .stars{font-size:30px;letter-spacing:6px;margin:6px 0}
.verdict h2{font-size:clamp(28px,7vw,42px);font-weight:800;margin:6px 0 2px;letter-spacing:-.01em}
.verdict .rk{font-family:var(--mono);color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-size:13px}
.verdict .reason{color:var(--muted);margin:14px auto 18px;max-width:420px}
.final{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:18px 0}
.final .fm{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px}
.final .fm .n{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.06em}
.final .fm .v{font-family:var(--mono);font-size:22px;font-weight:600}

.foot{text-align:center;color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:22px;opacity:.7}

body.facilitator{--display: system-ui,"Segoe UI",sans-serif}
body.facilitator .wrap{max-width:920px}
body.facilitator .scenario-text{font-size:21px}
body.facilitator .scenario-title{font-size:clamp(26px,5vw,38px)}
body.facilitator .dec .nm{font-size:17px}
body.facilitator .outcome-text{font-size:22px}

@media (max-width:560px){
  .hud{grid-template-columns:repeat(2,1fr)}
  .final{grid-template-columns:repeat(2,1fr)}
  .dec .nm{width:80px;flex-basis:80px}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar" id="topbar" style="display:none">
    <div class="brand">HUMAN <span class="fw">FIREWALL</span></div>
    <div class="pill mono" id="modePill">SOLO</div>
    <div class="counter mono" id="counter"></div>
    <button type="button" class="quitbtn mono" id="quitBtn" aria-label="Quit to main menu" style="display:none">&#10005; Menu</button>
  </div>

  <div class="hud" id="hud" style="display:none"></div>

  <div class="stage" id="stage"></div>

  <div class="foot" id="foot"></div>
</div>

<script>const GAME = {"meta": {"title": "Human Firewall", "subtitle": "A cyber-awareness card game", "incidentsPerGame": 20, "wrongAnswerPenalty": 1.75}, "meters": {"R": {"key": "R", "label": "Reputation", "short": "REP", "start": 70, "min": 0, "max": 100, "higherIsBetter": true, "winLine": 50, "warn": 50, "crit": 25, "hint": "Public & customer trust. Lose at 0."}, "M": {"key": "M", "label": "Funds", "short": "FUNDS", "start": 100, "min": 0, "max": 100, "higherIsBetter": true, "winLine": 1, "warn": 30, "crit": 15, "unit": "k", "prefix": "$", "hint": "Company money. Bankrupt at 0."}, "S": {"key": "S", "label": "Security", "short": "SEC", "start": 60, "min": 0, "max": 100, "higherIsBetter": true, "winLine": 40, "warn": 40, "crit": 20, "hint": "How hardened you are. Fully breached at 0."}, "X": {"key": "X", "label": "Stress", "short": "STRESS", "start": 30, "min": 0, "max": 100, "higherIsBetter": false, "winLine": 80, "warn": 60, "crit": 80, "hint": "Team pressure. Lower is better. Burnout at 100."}}, "ratings": [{"min": 80, "stars": 3, "label": "Human Firewall"}, {"min": 60, "stars": 2, "label": "Security-Aware"}, {"min": 40, "stars": 1, "label": "Getting There"}, {"min": 0, "stars": 0, "label": "At Risk"}], "decisions": [{"name": "TRUST", "color": "#b5292f", "meaning": "Do exactly what the message or caller asks. Comply with the request."}, {"name": "VERIFY", "color": "#1e7a3c", "meaning": "Independently confirm through a second, trusted channel before acting."}, {"name": "REPORT", "color": "#1e5fa8", "meaning": "Flag it to IT / Security (report-phishing button, ticket, or security@)."}, {"name": "IGNORE", "color": "#6b6f76", "meaning": "Do nothing. Delete or dismiss it and move on."}, {"name": "ESCALATE", "color": "#6b3fa0", "meaning": "Hand the decision to a manager or security lead for approval."}], "scenarios": [{"id": 1, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Phishing", "title": "The Password Reset", "targets": "Anyone", "text": "An urgent email “from Microsoft” warns your account will be locked in 24 hours. It tells you to click a link and re-enter your password now.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You enter your password on the fake page. Credentials stolen — the attacker logs in.", "deltas": {"S": -20, "R": -10, "X": 15}}, "VERIFY": {"text": "You hover the link, see a strange domain, and open the real portal yourself. No harm done.", "deltas": {"S": 5}}, "REPORT": {"text": "You use ‘Report Phishing’. Security blocks the sender for the whole company.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "You delete it. You’re safe, but colleagues still receive the same trap.", "deltas": {}}, "ESCALATE": {"text": "Your manager confirms it’s fake. Minor delay, no harm.", "deltas": {"S": 5, "X": 5}}}, "best": "REPORT (or VERIFY)", "bestDecision": "REPORT", "learn": "Real providers never ask you to confirm a password through an email link — go to the site yourself, or report it."}, {"id": 2, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Passwords", "title": "The Breach Notice", "targets": "Anyone", "text": "IT warns that a website where you used your work password has been breached. The same password also protects your work email.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You assume it’s fine and change nothing. Attackers reuse the password and break into your email.", "deltas": {"S": -20, "M": -10, "X": 15}}, "VERIFY": {"text": "You confirm the alert is really from IT, then realise the risk. Good caution.", "deltas": {"S": 5}}, "REPORT": {"text": "You tell security, who force a reset before anyone gets in.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "You move on. The reused password is quietly abused weeks later.", "deltas": {"S": -10, "X": 10}}, "ESCALATE": {"text": "You ask IT to reset everywhere and switch on MFA and a password manager.", "deltas": {"S": 15, "M": -5, "X": -5}}}, "best": "ESCALATE / REPORT", "bestDecision": "ESCALATE", "learn": "One leaked password unlocks everything if you reuse it — use unique passwords and a password manager."}, {"id": 3, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "MFA Fatigue", "title": "Approve? Approve? Approve?", "targets": "Anyone", "text": "Your phone buzzes with login-approval requests over and over at 11pm — sign-ins you never started. One more pops up.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You tap Approve just to make it stop. The attacker is now inside your account.", "deltas": {"S": -20, "R": -5, "X": 15}}, "VERIFY": {"text": "You check the location and time, see it isn’t you, and deny it.", "deltas": {"S": 5}}, "REPORT": {"text": "You deny it and alert security. They lock the account and block the attacker.", "deltas": {"S": 15, "X": -5}}, "IGNORE": {"text": "You deny and silence your phone. The attack stops, but no one is warned.", "deltas": {"S": 5, "X": 5}}, "ESCALATE": {"text": "You call IT, who reset your credentials immediately.", "deltas": {"S": 10}}}, "best": "REPORT", "bestDecision": "REPORT", "learn": "Never approve a login prompt you didn’t start — repeated prompts are an attack. Deny and report."}, {"id": 4, "category": "MOBILE", "categoryLabel": "On the Go", "color": "#c2710c", "type": "QR Scam", "title": "Scan to Pay", "targets": "Anyone", "text": "A sticker on the office parking meter reads “Scan to pay / update card details.” The QR code opens a payment page.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You scan and enter your card. The details are stolen on a fake page.", "deltas": {"M": -15, "S": -10, "X": 10}}, "VERIFY": {"text": "You use the meter’s official app instead of the sticker. Safe.", "deltas": {"S": 5}}, "REPORT": {"text": "You tell facilities/security. The fake sticker is removed and others are protected.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "You ignore it and pay another way. No harm to you.", "deltas": {}}, "ESCALATE": {"text": "Facilities investigate where the sticker came from.", "deltas": {"S": 5}}}, "best": "REPORT", "bestDecision": "REPORT", "learn": "A QR code hides where it really goes — don’t scan random ones in public; use the official app or site."}, {"id": 5, "category": "MONEY", "categoryLabel": "Money & Payments", "color": "#b5292f", "type": "Invoice Fraud", "title": "The Bank Details Changed", "targets": "Finance Officer", "text": "A known supplier emails a normal-looking invoice, with a note: “Please note our bank account has changed — pay the new account below.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You pay the new account. The money goes straight to a fraudster.", "deltas": {"M": -25, "R": -10, "X": 15}}, "VERIFY": {"text": "You call the supplier on the number you already have. The change is fake.", "deltas": {"S": 5}}, "REPORT": {"text": "You flag it to security and finance. The fraud is caught and others are warned.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "You don’t pay at all. Awkward with a real supplier, but no money lost.", "deltas": {"R": -5, "X": 5}}, "ESCALATE": {"text": "Dual approval catches the mismatch before payment.", "deltas": {"X": 5}}}, "best": "VERIFY (call a known number)", "bestDecision": "VERIFY", "learn": "Always confirm changed bank details by calling a number you already trust — never the one on the invoice."}, {"id": 6, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "USB Drop", "title": "The Found Drive", "targets": "Anyone", "text": "You find a USB stick in the car park labelled “Payroll 2025 — Confidential.” Curiosity says plug it in.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You plug it in. Malware runs automatically and spreads onto the network.", "deltas": {"S": -20, "M": -10, "X": 15}}, "VERIFY": {"text": "There’s no safe way to ‘check’ it by plugging in — you treat it as suspicious.", "deltas": {"S": 5}}, "REPORT": {"text": "You hand it to IT, who examine it safely in isolation.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "You bin it. Safe, but a possible drop attack goes unreported.", "deltas": {}}, "ESCALATE": {"text": "IT investigate a possible ‘USB drop’ targeting the office.", "deltas": {"S": 10}}}, "best": "REPORT", "bestDecision": "REPORT", "learn": "‘USB drop’ attacks bait your curiosity — never plug in a drive you found. Hand it to IT."}, {"id": 7, "category": "VOICE", "categoryLabel": "Phone & Voice", "color": "#6b3fa0", "type": "Deepfake Call", "title": "The CEO’s Voice", "targets": "Finance Officer / Admin", "text": "A call comes in. It sounds exactly like the CEO: “I’m in a meeting — move €40,000 to this account right now, and keep it quiet.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You make the transfer. The voice was AI-cloned; the funds are gone.", "deltas": {"M": -25, "R": -10, "X": 20}}, "VERIFY": {"text": "You call the CEO back on a known number (or use your code word). It’s fake.", "deltas": {"S": 5}}, "REPORT": {"text": "You flag the attempt to security. The team is warned about voice-clone fraud.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "You hang up. Safe, but the attempt isn’t reported.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You require the normal payment-approval process, which stops it.", "deltas": {"X": 5}}}, "best": "VERIFY (call back on a trusted number)", "bestDecision": "VERIFY", "learn": "AI can clone a voice. Urgency + secrecy + money is the scam pattern — always verify on a known channel."}, {"id": 8, "category": "SOCIAL", "categoryLabel": "Social & Online", "color": "#b83280", "type": "Oversharing", "title": "The Helpful Post", "targets": "Intern / New Hire", "text": "An intern proudly posts a first-day photo — their screen, their badge, and “Can’t believe how easy our new vendor portal login is!”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "The post stays up. Attackers harvest the details for a targeted phishing attack.", "deltas": {"S": -10, "R": -5, "X": 5}}, "VERIFY": {"text": "You check exactly what’s visible in the photo first.", "deltas": {"S": 5}}, "REPORT": {"text": "You quietly flag it; the post is taken down and friendly guidance is given.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "The post stays public and the risk remains.", "deltas": {"S": -5}}, "ESCALATE": {"text": "You ask a manager to clarify the social-media policy for everyone.", "deltas": {"S": 5}}}, "best": "REPORT (and coach them)", "bestDecision": "REPORT", "learn": "Badges, screens and ‘behind the scenes’ posts leak details attackers use. Think before you post."}, {"id": 9, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Ransomware", "title": "Your Files Are Locked", "targets": "Anyone", "text": "A red full-screen message appears: “All your files are encrypted. Pay $2,000 in crypto within 48 hours or lose everything.” A colleague says “just pay it!”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You pay the ransom. There’s no guarantee of recovery — and you’re now a known payer.", "deltas": {"M": -25, "S": -10, "X": 20}}, "VERIFY": {"text": "You don’t negotiate alone — you get help before doing anything.", "deltas": {}}, "REPORT": {"text": "You disconnect the device and call IT at once. The spread is contained; backups restore the files.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "You keep working. The ransomware spreads to shared drives.", "deltas": {"S": -20, "X": 15}}, "ESCALATE": {"text": "Incident response and leadership coordinate a clean recovery — no payment.", "deltas": {"S": 15, "M": -5}}}, "best": "REPORT (disconnect & call IT)", "bestDecision": "REPORT", "learn": "Don’t pay and don’t panic — isolate the device and call IT. Good backups beat ransoms."}, {"id": 10, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Compromised Account", "title": "Send Me Payroll", "targets": "HR Manager / Finance", "text": "A Microsoft Teams message from your manager’s account: “Hey, can you send me the payroll spreadsheet urgently? I’m boarding a flight.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You send the file. The account was hijacked — employee data is leaked.", "deltas": {"R": -15, "S": -15, "X": 15}}, "VERIFY": {"text": "You reach your manager another way and learn their account was compromised.", "deltas": {"S": 10}}, "REPORT": {"text": "You flag the account to IT, who secure it before more damage is done.", "deltas": {"S": 15, "X": -5}}, "IGNORE": {"text": "You don’t send it, but the hijacked account stays active and dangerous.", "deltas": {"S": -5}}, "ESCALATE": {"text": "Manager and security are looped in and the account is locked.", "deltas": {"S": 10}}}, "best": "VERIFY, then REPORT", "bestDecision": "VERIFY", "learn": "Even a trusted account can be hijacked — verify unusual data requests through another channel."}, {"id": 11, "category": "SOCIAL", "categoryLabel": "Social & Online", "color": "#b83280", "type": "Impersonation", "title": "A Message from the Boss", "targets": "Anyone", "text": "A brand-new account using the CEO’s name and photo messages staff: “I need your mobile number for a quick confidential task.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You reply and help, and get drawn into a gift-card / transfer scam.", "deltas": {"M": -10, "R": -5, "X": 10}}, "VERIFY": {"text": "You confirm with the CEO’s real contact — the account is fake.", "deltas": {"S": 5}}, "REPORT": {"text": "You report the impersonation; the account is taken down and staff are warned.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "You ignore it. Safe for you; others may still be targeted.", "deltas": {}}, "ESCALATE": {"text": "Comms and security alert all staff to the fake account.", "deltas": {"S": 10}}}, "best": "REPORT", "bestDecision": "REPORT", "learn": "Impersonation accounts copy names and photos — verify identity before acting on ‘confidential’ asks."}, {"id": 12, "category": "VOICE", "categoryLabel": "Phone & Voice", "color": "#6b3fa0", "type": "Vishing", "title": "IT Support Calling", "targets": "Anyone", "text": "A caller says: “This is IT — we’ve found a virus on your PC. I’ll walk you through installing a fix; just grant me remote access.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You install the ‘fix’ and grant access. The caller now controls your PC.", "deltas": {"S": -20, "X": 15}}, "VERIFY": {"text": "You hang up and call IT on the number you know. There’s no such ticket.", "deltas": {"S": 5}}, "REPORT": {"text": "You report the call so security can warn others.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "You hang up and move on. Safe.", "deltas": {"X": 5}}, "ESCALATE": {"text": "IT investigate the spoofed support call.", "deltas": {"S": 5}}}, "best": "VERIFY (call IT back yourself)", "bestDecision": "VERIFY", "learn": "Real IT won’t cold-call you for remote access — hang up and call the number you already know."}, {"id": 13, "category": "PHYSICAL", "categoryLabel": "Physical & In-Person", "color": "#8a5a2b", "type": "Tailgating", "title": "Hold the Door", "targets": "Receptionist / Anyone", "text": "Someone in a delivery uniform, arms full of boxes, smiles at the secure door behind you: “Thanks — could you hold it? I’ve forgotten my badge.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You hold the door. An unauthorised stranger is now inside the building.", "deltas": {"S": -15, "X": 10}}, "VERIFY": {"text": "You politely point them to reception to sign in. They had no business there.", "deltas": {"S": 10}}, "REPORT": {"text": "You alert security, who check and escort them.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "You let the door close behind you. Safe-ish, but no one is alerted.", "deltas": {}}, "ESCALATE": {"text": "Reception verifies whether they have an appointment.", "deltas": {"S": 5}}}, "best": "VERIFY (send them to reception)", "bestDecision": "VERIFY", "learn": "‘Tailgating’ bypasses all your tech security — everyone badges in, no exceptions, however polite."}, {"id": 14, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Shadow IT", "title": "There’s an App for That", "targets": "Salesperson / Anyone", "text": "To work faster, a teammate suggests uploading the full client list to a free online tool they found to ‘clean it up.’", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You upload the data. The client list is now in the hands of an unknown third party.", "deltas": {"R": -10, "S": -10, "X": 5}}, "VERIFY": {"text": "You check with IT whether the tool is approved — it isn’t, so you find a safe option.", "deltas": {"S": 5}}, "REPORT": {"text": "You ask IT to vet it; they approve a safe alternative.", "deltas": {"S": 10}}, "IGNORE": {"text": "You stick with the approved process. No harm done.", "deltas": {}}, "ESCALATE": {"text": "IT review and provide a sanctioned tool.", "deltas": {"S": 10}}}, "best": "VERIFY / ESCALATE with IT", "bestDecision": "VERIFY", "learn": "Free ‘helpful’ tools can harvest your data — check with IT before uploading any company information."}, {"id": 15, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Malware Doc", "title": "Enable Content to View", "targets": "Anyone", "text": "An attachment, “Invoice.docx,” opens to a banner: “Protected view — Enable Content to see this document.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You enable content. Hidden macro malware runs on your machine.", "deltas": {"S": -20, "X": 15}}, "VERIFY": {"text": "You weren’t expecting it, so you don’t enable anything and check the sender.", "deltas": {"S": 5}}, "REPORT": {"text": "You report it as phishing; the sender is blocked.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "You close the file. Safe.", "deltas": {}}, "ESCALATE": {"text": "IT examine the file in a safe environment.", "deltas": {"S": 5}}}, "best": "REPORT (don’t enable content)", "bestDecision": "REPORT", "learn": "‘Enable content’ on an unexpected document can run hidden malware — when in doubt, report it."}, {"id": 16, "category": "MOBILE", "categoryLabel": "On the Go", "color": "#c2710c", "type": "Lost Device", "title": "Left on the Train", "targets": "Salesperson", "text": "You realise your work laptop — logged in and full of client data — was left on the train.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You wait and hope it turns up. The data is exposed if the wrong person finds it.", "deltas": {"R": -10, "S": -10, "X": 15}}, "VERIFY": {"text": "You retrace your steps and check lost property — but every minute counts.", "deltas": {"X": 5}}, "REPORT": {"text": "You tell IT immediately; they remote-lock and wipe it before anyone can access it.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "You say nothing. The unsecured laptop becomes a breach.", "deltas": {"R": -15, "S": -15, "X": 15}}, "ESCALATE": {"text": "IT and your manager handle containment and any disclosure.", "deltas": {"S": 10}}}, "best": "REPORT (fast, so IT can wipe it)", "bestDecision": "REPORT", "learn": "Report lost devices immediately — a quick remote lock or wipe turns a disaster into a non-event."}, {"id": 17, "category": "VOICE", "categoryLabel": "Phone & Voice", "color": "#6b3fa0", "type": "Pretexting", "title": "From the New Auditor", "targets": "HR Manager / Finance", "text": "A polite caller claims to be a new external auditor and asks you to email a list of all staff names, emails and job titles ‘for the audit.’", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You send the list. It’s used to build a convincing mass-phishing campaign.", "deltas": {"R": -5, "S": -15, "X": 10}}, "VERIFY": {"text": "You confirm with your own finance/audit contact — there is no such auditor.", "deltas": {"S": 10}}, "REPORT": {"text": "You report the call; staff are warned of the pretext.", "deltas": {"S": 10, "X": -5}}, "IGNORE": {"text": "You don’t send anything. Safe.", "deltas": {}}, "ESCALATE": {"text": "A manager verifies whether any audit is actually engaged.", "deltas": {"S": 5}}}, "best": "VERIFY (through your own contact)", "bestDecision": "VERIFY", "learn": "‘Officials’ who pressure you for staff data are a classic pretext — verify through a contact you already trust."}, {"id": 18, "category": "VOICE", "categoryLabel": "Phone & Voice", "color": "#6b3fa0", "type": "Code Theft", "title": "Read Me Your Code", "targets": "Anyone", "text": "Right after a login alert, you get a call: “Hi, your bank’s fraud team here. To cancel the suspicious login, read me the 6-digit code we just texted you.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You read the code aloud. That code was the key — the attacker completes their login.", "deltas": {"M": -20, "S": -15, "X": 15}}, "VERIFY": {"text": "You hang up and call the bank on the number on your card. It’s a scam.", "deltas": {"S": 10}}, "REPORT": {"text": "You report the call and freeze the account.", "deltas": {"S": 5, "X": -5}}, "IGNORE": {"text": "You hang up. Safe.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You loop in your bank’s verified fraud line.", "deltas": {"S": 5}}}, "best": "VERIFY (never share a code)", "bestDecision": "VERIFY", "learn": "No real bank or service ever asks you to read back a one-time code — that code unlocks your account."}, {"id": 19, "category": "MONEY", "categoryLabel": "Money & Payments", "color": "#b5292f", "type": "Legitimate Invoice", "title": "The Monthly Invoice", "targets": "Finance Officer", "text": "A regular monthly invoice lands in the accounts inbox from a supplier you’ve used for years. Same bank details as always, the usual amount, and it matches an existing purchase order.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You pay it through the normal process. The supplier is paid on time and the relationship stays healthy.", "deltas": {"R": 5}}, "VERIFY": {"text": "You quickly match it against the purchase order before paying. Prudent — costs a moment.", "deltas": {"X": 5}}, "REPORT": {"text": "You flag it as fraud. Security investigates, finds nothing, and a real supplier is left waiting.", "deltas": {"R": -5, "X": 10}}, "IGNORE": {"text": "You don’t pay. The genuine supplier chases late fees and the relationship sours.", "deltas": {"M": -10, "R": -10, "X": 10}}, "ESCALATE": {"text": "You bump a routine payment up the chain. Fine, just slower than it needed to be.", "deltas": {"X": 5}}}, "best": "TRUST (pay via the normal process)", "bestDecision": "TRUST", "learn": "Not everything is an attack. A known supplier, normal channel, unchanged details and a matching PO are signs it’s genuine — and paying on time matters too."}, {"id": 20, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Genuine IT Notice", "title": "Patch Tonight", "targets": "Anyone", "text": "A message in the official IT channel says a security update will install automatically tonight. No action needed, no links, and it never asks for your password.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You let it run. Your machine stays patched and protected.", "deltas": {"S": 10}}, "VERIFY": {"text": "You confirm it really came from the IT channel. Quick and sensible.", "deltas": {}}, "REPORT": {"text": "You report it as phishing. Security spends time confirming their own genuine notice.", "deltas": {"X": 10}}, "IGNORE": {"text": "No action was needed anyway — no harm done.", "deltas": {}}, "ESCALATE": {"text": "You escalate a routine notice. Unnecessary, but harmless.", "deltas": {"X": 5}}}, "best": "TRUST (no links, no credentials, official channel)", "bestDecision": "TRUST", "learn": "Real IT messages come through official channels and never ask for passwords or urgent clicks. Spotting a genuine notice avoids alarm fatigue."}, {"id": 21, "category": "PHYSICAL", "categoryLabel": "Physical & In-Person", "color": "#8a5a2b", "type": "Real Onboarding", "title": "The First Morning", "targets": "Intern / New Hire / HR", "text": "On the new hire’s first morning, HR sits with them and sets up payroll directly inside the official HR system — in person, no emails, no external links.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "Payroll is set up correctly and securely. A smooth start.", "deltas": {"S": 5}}, "VERIFY": {"text": "The new hire double-checks they’re in the real HR system. Good habit.", "deltas": {}}, "REPORT": {"text": "They report their own legitimate onboarding. Awkward, and it stalls their setup.", "deltas": {"X": 10}}, "IGNORE": {"text": "They put it off. Their own payroll setup is delayed.", "deltas": {"X": 10}}, "ESCALATE": {"text": "Unnecessary for a normal in-person setup.", "deltas": {"X": 5}}}, "best": "TRUST (in person, official system, no links)", "bestDecision": "TRUST", "learn": "Compare this with the fake ‘confirm your bank details’ email: official system, in person, no links. Context separates real from fake."}, {"id": 22, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Verified Customer", "title": "Their Own Account", "targets": "Salesperson / Admin", "text": "A customer, logged in and identity-verified through your official support portal, asks for a copy of their own account information.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You provide it through the portal. Good service, happy customer.", "deltas": {"R": 5}}, "VERIFY": {"text": "Their identity is already confirmed by the portal, but a quick check doesn’t hurt.", "deltas": {"X": 5}}, "REPORT": {"text": "You treat a verified customer as a threat. Security finds nothing and the customer is frustrated.", "deltas": {"R": -5, "X": 5}}, "IGNORE": {"text": "You leave a legitimate request hanging. The customer’s experience suffers.", "deltas": {"R": -10, "X": 5}}, "ESCALATE": {"text": "You pass a routine, verified request up the line. Slower service than needed.", "deltas": {"X": 5}}}, "best": "TRUST (identity verified through the official portal)", "bestDecision": "TRUST", "learn": "Security shouldn’t block legitimate service. Verified identity through an official channel means you can help with confidence."}, {"id": 23, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Sanctioned Tool", "title": "A Tool to Try", "targets": "Anyone", "text": "A teammate suggests a tool to tidy up a client list. You check, and it’s already on IT’s approved-software list.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You use the approved tool. Work gets done and the data stays within sanctioned systems.", "deltas": {}}, "VERIFY": {"text": "You confirm it’s on the approved list first — exactly the right check.", "deltas": {"S": 5}}, "REPORT": {"text": "You report an already-approved tool. A quick dead end for security.", "deltas": {"X": 5}}, "IGNORE": {"text": "You avoid a perfectly safe, approved tool and do it the slow way.", "deltas": {"X": 5}}, "ESCALATE": {"text": "Unnecessary — it’s already sanctioned.", "deltas": {"X": 5}}}, "best": "VERIFY it’s approved, then use it", "bestDecision": "VERIFY", "learn": "The rule isn’t ‘never use online tools’ — it’s ‘use approved ones.’ Knowing what’s sanctioned is the skill."}, {"id": 24, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Routine Request", "title": "The Weekly Report", "targets": "Anyone", "text": "Your manager, in your usual work chat thread, asks you to send over a non-sensitive document the two of you share every week.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You send it. Normal request, normal channel — work moves along.", "deltas": {}}, "VERIFY": {"text": "You insist on verifying a routine, non-sensitive request. It’s safe, but it slows things and signals distrust.", "deltas": {"R": -5, "X": 5}}, "REPORT": {"text": "You report your own manager’s normal request. Confusing for everyone.", "deltas": {"R": -5, "X": 10}}, "IGNORE": {"text": "You ignore a reasonable ask from your manager. Not a great look.", "deltas": {"R": -5, "X": 5}}, "ESCALATE": {"text": "You escalate a routine request — unnecessary friction.", "deltas": {"X": 5}}}, "best": "TRUST (normal channel, normal request, nothing sensitive)", "bestDecision": "TRUST", "learn": "Constant suspicion of normal requests grinds work to a halt. Save verification for the red flags: urgency, secrecy, sensitive data, or an unusual channel."}, {"id": 25, "category": "MONEY", "categoryLabel": "Money & Payments", "color": "#b5292f", "type": "Unusual Invoice", "title": "The Urgent Invoice", "targets": "Finance Officer", "text": "An invoice from a known supplier arrives — bank details unchanged, but the amount is noticeably higher than usual and the tone is pushier and more urgent than their normal emails.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You pay it as-is. The figure was padded from a compromised supplier mailbox — partly avoidable.", "deltas": {"M": -15, "X": 10}}, "VERIFY": {"text": "One call to the supplier on a known number clears it up before any money moves.", "deltas": {"S": 5}}, "REPORT": {"text": "You escalate to security. A bit heavy for one odd detail, but no harm.", "deltas": {"X": 5}}, "IGNORE": {"text": "You sit on it. If it was genuine, the supplier is now chasing you.", "deltas": {"R": -5, "X": 5}}, "ESCALATE": {"text": "You route it for a second approval — reasonable for an unusual amount.", "deltas": {"S": 5}}}, "best": "VERIFY — one quick call resolves the doubt", "bestDecision": "VERIFY", "learn": "When something is mostly normal but one detail is off (amount, tone, urgency), a 30-second check beats both blindly paying and crying fraud."}, {"id": 26, "category": "SOCIAL", "categoryLabel": "Social & Online", "color": "#b83280", "type": "Possible Lure", "title": "Recruiter in Your Inbox", "targets": "Anyone", "text": "A recruiter messages you with a plausible-looking role and asks you to send your CV and contact details. It might be a real opportunity — or a way to harvest your information.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You send a full CV with personal details to an unverified stranger. Possibly fine, possibly harvested.", "deltas": {"S": -5, "X": 5}}, "VERIFY": {"text": "You check the recruiter’s profile and the company before sharing anything. Sensible.", "deltas": {}}, "REPORT": {"text": "You report it. If it was genuine, you may have flagged a real recruiter — minor noise.", "deltas": {"X": 5}}, "IGNORE": {"text": "You ignore it. Safe, though you might pass up a real opportunity.", "deltas": {}}, "ESCALATE": {"text": "Not really an escalation matter.", "deltas": {"X": 5}}}, "best": "VERIFY (check the profile and company first)", "bestDecision": "VERIFY", "learn": "Not malicious by default, not safe by default. Verify the source before handing over personal information."}, {"id": 27, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Re-auth Prompt", "title": "Sign In Again", "targets": "Anyone", "text": "Right after a genuine software update, an app asks you to sign in again. It could be a normal re-authentication — or a fake prompt placed to catch your password.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You type your password straight into the popup. If it was fake, it’s now stolen.", "deltas": {"S": -10, "X": 10}}, "VERIFY": {"text": "You close the popup and sign in by opening the app yourself. Safe either way.", "deltas": {"S": 5}}, "REPORT": {"text": "You report it. If real, a little noise; no harm done.", "deltas": {"X": 5}}, "IGNORE": {"text": "You dismiss it and can’t use the app until you sign in.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You ask IT — fine, if a touch slow.", "deltas": {"X": 5}}}, "best": "VERIFY (sign in through the app yourself, not the popup)", "bestDecision": "VERIFY", "learn": "Re-auth prompts are often real — but only ever enter credentials somewhere you navigated to yourself."}, {"id": 28, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Unexpected Link", "title": "Did You Send This?", "targets": "Anyone", "text": "A coworker drops a document link in chat. You weren’t expecting it, but it’s plausibly work-related and they often share files.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You click it. Their account had been hijacked and the link was malicious — partly avoidable.", "deltas": {"S": -10, "X": 10}}, "VERIFY": {"text": "A quick ‘did you send this?’ confirms it before you click. Two seconds well spent.", "deltas": {"S": 5}}, "REPORT": {"text": "You report it without asking. If genuine, a small false alarm.", "deltas": {"X": 5}}, "IGNORE": {"text": "You skip it. Safe, but you might miss real work.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You loop in IT — a bit much before a simple check.", "deltas": {"X": 5}}}, "best": "VERIFY (a quick ‘did you send this?’)", "bestDecision": "VERIFY", "learn": "Even real colleagues get hijacked. A two-second check before clicking an unexpected link costs nothing."}, {"id": 29, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Hoax", "title": "Forward to Everyone", "targets": "Anyone", "text": "A well-meaning colleague forwards you a warning: “URGENT — forward this to everyone or Microsoft will shut our email down tomorrow!” It’s a classic chain-mail hoax.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You forward it company-wide. Now everyone’s inbox carries the panic.", "deltas": {"R": -5, "X": 10}}, "VERIFY": {"text": "You spend time ‘checking’ an obvious hoax. Harmless, but wasted effort.", "deltas": {"X": 5}}, "REPORT": {"text": "You raise a security ticket for a harmless chain email. Minor noise.", "deltas": {"X": 5}}, "IGNORE": {"text": "You delete it and don’t pass it on. The hoax stops with you.", "deltas": {}}, "ESCALATE": {"text": "You escalate a hoax to management. Overkill.", "deltas": {"X": 5}}}, "best": "IGNORE (don’t forward it)", "bestDecision": "IGNORE", "learn": "Hoaxes survive by being forwarded. Don’t pass them on, don’t panic — just delete."}, {"id": 30, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Marketing Spam", "title": "Book a Demo", "targets": "Anyone", "text": "An unsolicited but genuine-looking email from a software vendor wants to book a demo and sell you their product. It’s not a scam — just spam you didn’t ask for.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You engage, and invite a steady stream of follow-up spam.", "deltas": {"X": 5}}, "VERIFY": {"text": "You research a cold sales email. Time you won’t get back.", "deltas": {"X": 5}}, "REPORT": {"text": "You report marketing spam as phishing. Security checks it, finds nothing, and your real reports look less urgent.", "deltas": {"X": 5}}, "IGNORE": {"text": "You delete it (or unsubscribe). Done — it was never a security matter.", "deltas": {}}, "ESCALATE": {"text": "You escalate junk mail. Unnecessary.", "deltas": {"X": 5}}}, "best": "IGNORE (just delete or unsubscribe)", "bestDecision": "IGNORE", "learn": "Not every unwanted email is an attack. Marketing spam gets deleted or unsubscribed — it’s not a security incident."}, {"id": 31, "category": "SOCIAL", "categoryLabel": "Social & Online", "color": "#b83280", "type": "Public Troll", "title": "The Rude Comment", "targets": "Salesperson / Admin", "text": "On the company’s public social account, an anonymous user posts a rude, baiting comment clearly designed to provoke a reaction.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You fire back in public. The argument escalates and reflects badly on the brand.", "deltas": {"R": -10, "X": 10}}, "VERIFY": {"text": "There’s nothing here to verify.", "deltas": {"X": 5}}, "REPORT": {"text": "You report a single rude comment as a security threat — it isn’t one.", "deltas": {"X": 5}}, "IGNORE": {"text": "You don’t take the bait. With no audience, the comment fizzles out.", "deltas": {}}, "ESCALATE": {"text": "You escalate a one-off troll to comms. Save that for real harassment or impersonation.", "deltas": {"X": 5}}}, "best": "IGNORE (don’t feed the troll)", "bestDecision": "IGNORE", "learn": "Public trolls want a reaction. Don’t engage — escalate only if it turns into harassment or impersonation."}, {"id": 32, "category": "SOCIAL", "categoryLabel": "Social & Online", "color": "#b83280", "type": "Random Request", "title": "A Stranger Wants to Connect", "targets": "Anyone", "text": "You get a connection request from someone you don’t know — no mutual contacts, a thin generic profile. It isn’t impersonating anyone; it’s just a stranger.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You accept and chat freely, handing a stranger a window into your work life.", "deltas": {"S": -5, "X": 5}}, "VERIFY": {"text": "You investigate a random request at length. Disproportionate.", "deltas": {"X": 5}}, "REPORT": {"text": "You report an ordinary stranger as a threat. False alarm.", "deltas": {"X": 5}}, "IGNORE": {"text": "You leave it or decline. No harm, no fuss.", "deltas": {}}, "ESCALATE": {"text": "You escalate a connection request. Overkill.", "deltas": {"X": 5}}}, "best": "IGNORE (just decline)", "bestDecision": "IGNORE", "learn": "A stranger’s request isn’t a threat to report — decline or ignore it. Save caution for accounts impersonating real people."}, {"id": 33, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Junk Scam", "title": "You’ve Won!", "targets": "Anyone", "text": "An email already sitting in your junk folder shouts: “CONGRATULATIONS!!! You’ve WON $1,000,000 in a lottery you never entered. Claim within 24 hours!” It’s riddled with typos.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You click through and start handing over details on a scam page.", "deltas": {"S": -10, "X": 10}}, "VERIFY": {"text": "You waste time ‘checking’ a lottery you never entered.", "deltas": {"X": 5}}, "REPORT": {"text": "You file a ticket for junk the filter already caught. Save reporting for convincing, targeted messages.", "deltas": {"X": 5}}, "IGNORE": {"text": "You delete it. Obvious junk, already filtered — no ticket needed.", "deltas": {}}, "ESCALATE": {"text": "You escalate obvious spam. No need.", "deltas": {"X": 5}}}, "best": "IGNORE (just delete it)", "bestDecision": "IGNORE", "learn": "Obvious junk that’s already in spam doesn’t need a ticket — delete it. Reserve reporting for messages that look targeted or convincing."}, {"id": 34, "category": "VOICE", "categoryLabel": "Phone & Voice", "color": "#6b3fa0", "type": "Press Enquiry", "title": "The Journalist Calls", "targets": "Receptionist / Admin / Executive", "text": "A journalist phones and asks you to confirm whether the company suffered a data breach last week. You’re not certain, and it isn’t your place to speak for the company.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You comment on the company’s behalf without authority — your words become the story.", "deltas": {"R": -15, "X": 10}}, "VERIFY": {"text": "You can’t verify a breach yourself, and that isn’t the point.", "deltas": {"X": 5}}, "REPORT": {"text": "You file an IT ticket — wrong channel. This is a comms and leadership matter.", "deltas": {"X": 5}}, "IGNORE": {"text": "You brush them off and tell nobody. Leadership is blindsided when it runs.", "deltas": {"R": -5, "X": 5}}, "ESCALATE": {"text": "You take a message and pass it straight to management / comms. Exactly right.", "deltas": {"R": 5}}}, "best": "ESCALATE (to management / comms)", "bestDecision": "ESCALATE", "learn": "Press, legal and regulator questions go straight to management — never improvise on the company’s behalf, and never just sit on them."}, {"id": 35, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Official Request", "title": "A Request for Records", "targets": "HR Manager / Finance", "text": "A request arrives — confirmed genuine through proper channels — from a regulator asking for a set of customer records. It’s real, but releasing customer data is a big, high-stakes step.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "Even though it’s genuine, you release customer data on your own authority — a serious overstep.", "deltas": {"R": -10, "S": -10, "X": 10}}, "VERIFY": {"text": "Confirming it’s real is wise — but once it is, you still must escalate, not act alone.", "deltas": {"X": 5}}, "REPORT": {"text": "This isn’t a phishing report; it needs an authority decision.", "deltas": {"X": 5}}, "IGNORE": {"text": "You sit on a legitimate regulator request. That invites real trouble.", "deltas": {"R": -10, "X": 10}}, "ESCALATE": {"text": "You route it to management / legal / your data-protection lead for sign-off. Correct.", "deltas": {"S": 5}}}, "best": "ESCALATE (for the right sign-off)", "bestDecision": "ESCALATE", "learn": "Even a legitimate request for sensitive data needs proper authorisation. Confirm it’s real, then escalate — don’t release data solo."}, {"id": 36, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Insider Risk", "title": "Working From Home", "targets": "Anyone / IT", "text": "You notice a teammate routinely emailing unencrypted customer spreadsheets to their personal Gmail so they can work from home. They’re not malicious — just careless.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You decide it’s none of your business — and quietly condone the risk.", "deltas": {"S": -10}}, "VERIFY": {"text": "There’s nothing to verify; the behaviour is plain to see.", "deltas": {"X": 5}}, "REPORT": {"text": "You open a formal security incident on a careless but well-meaning colleague — heavier than it needs to be.", "deltas": {"X": 5}}, "IGNORE": {"text": "You let it slide. The data keeps leaving the company unprotected.", "deltas": {"S": -10, "X": 10}}, "ESCALATE": {"text": "You raise it calmly with your manager / security, so it’s handled and the person gets support.", "deltas": {"S": 10}}}, "best": "ESCALATE (raise it through the right channel)", "bestDecision": "ESCALATE", "learn": "Insider mistakes are a people problem, not a phishing report. Raise them through your manager or security so they’re handled constructively."}, {"id": 37, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Privilege Request", "title": "The Access Request", "targets": "IT / Developer", "text": "A new manager asks — politely, through the proper ticket system — for full admin access to a sensitive system ‘to do their job.’ The request looks legitimate and follows process, but it’s a big privilege to grant.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You hand over broad admin access with no review — a real exposure, however well-meant.", "deltas": {"S": -15, "X": 10}}, "VERIFY": {"text": "Confirming identity is fine, but the real question is how much access is appropriate.", "deltas": {"X": 5}}, "REPORT": {"text": "Nothing here to report — it isn’t a threat, it’s an authorisation call.", "deltas": {"X": 5}}, "IGNORE": {"text": "You quietly block a legitimate-looking request and stall the new manager’s work.", "deltas": {"R": -5, "X": 10}}, "ESCALATE": {"text": "You route it to the system owner for a least-privilege review and approval. Exactly how big grants should work.", "deltas": {"S": 10}}}, "best": "ESCALATE (for least-privilege approval)", "bestDecision": "ESCALATE", "learn": "Genuine-looking, high-impact requests still need the right approval. Escalate big access grants for review rather than granting — or blocking — them yourself."}, {"id": 38, "category": "MONEY", "categoryLabel": "Money & Payments", "color": "#b5292f", "type": "Extortion", "title": "A Quiet Demand", "targets": "Anyone / Executive", "text": "An email addressed to you personally threatens to leak company data unless you arrange a payment quietly, today. It feels aimed and credible.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You engage and arrange payment alone — funding a criminal with no guarantee of anything.", "deltas": {"M": -20, "X": 15}}, "VERIFY": {"text": "There’s no safe way to ‘check’ an extortion demand yourself.", "deltas": {"X": 5}}, "REPORT": {"text": "Logging it helps, but a threat like this needs leadership and incident response, not just a ticket.", "deltas": {"X": 5}}, "IGNORE": {"text": "You bury a credible threat against the company. If it’s real, nobody is ready.", "deltas": {"S": -10, "X": 10}}, "ESCALATE": {"text": "You take it straight to leadership and incident response. The right people respond as a team.", "deltas": {"S": 5}}}, "best": "ESCALATE (to leadership / incident response)", "bestDecision": "ESCALATE", "learn": "A credible threat against the company goes to leadership and incident response fast — don’t pay, don’t negotiate, and don’t sit on it alone."}], "roles": [{"name": "Receptionist / Front Desk", "color": "#8a5a2b", "description": "The first point of contact for every visitor, call and delivery.", "targetedBy": "Tailgating, suspicious visitors, phone scams.", "ability": "Gatekeeper — once per game, auto-resolve any physical/visitor scenario as VERIFY (prevented)."}, {"name": "HR Manager", "color": "#b83280", "description": "Holds the personal data of everyone in the company.", "targetedBy": "Fake onboarding, data requests, payroll phishing.", "ability": "Records Lock — once per game, cancel one Reputation loss from a data-leak outcome."}, {"name": "Finance Officer", "color": "#b5292f", "description": "Controls payments — the prize attackers want most.", "targetedBy": "Invoice fraud, business-email compromise, deepfake transfer calls.", "ability": "Dual Control — once per game, force VERIFY on a money scenario (no Funds lost that round)."}, {"name": "CEO / Executive", "color": "#1e5fa8", "description": "High authority and a public profile — often the person attackers impersonate.", "targetedBy": "Impersonation and deepfakes (as the faked person), targeted phishing.", "ability": "Set the Tone — once per game, reduce the team’s Stress by 10."}, {"name": "Intern / New Hire", "color": "#0f766e", "description": "Eager to help and still learning what’s normal.", "targetedBy": "Pressure tactics, onboarding scams, oversharing online.", "ability": "Beginner’s Question — once per game, ask the facilitator one yes/no question before deciding."}, {"name": "IT / Developer", "color": "#6b3fa0", "description": "Keeps the systems running and is trusted with access.", "targetedBy": "Vishing (‘IT support’), malicious files, shadow IT.", "ability": "Patch It — once per game, turn one REPORT into a guaranteed ‘attack prevented.’"}, {"name": "Salesperson", "color": "#c2710c", "description": "Always on the move, with lots of external contact and devices.", "targetedBy": "Public Wi-Fi, lost devices, QR scams.", "ability": "Road Warrior — once per game, ignore one Stress penalty."}], "events": [{"title": "IT Is Overloaded", "text": "Any REPORT this round takes effect next round instead of now.", "effect": null}, {"title": "The CEO Is on Vacation", "text": "You can’t verify with the CEO this round: +5 Stress on any CEO-related scenario.", "effect": null}, {"title": "Journalist Calls", "text": "If Reputation is below 60, lose 5 more Reputation. Otherwise, no effect.", "effect": null}, {"title": "Customer Complains Online", "text": "Reputation −5 immediately.", "effect": {"R": -5}}, {"title": "Payday Rush", "text": "Finance is slammed — the next money scenario adds +5 Stress.", "effect": null}, {"title": "Audit Week", "text": "Good security calls this round earn +5 extra Security Score.", "effect": null}, {"title": "System Outage", "text": "Everyone’s Stress +10.", "effect": {"X": 10}}, {"title": "Budget Cuts", "text": "Funds −10.", "effect": {"M": -10}}, {"title": "Awareness Training Done", "text": "Reward: Security +10 and Stress −5.", "effect": {"S": 10, "X": -5}}, {"title": "Holiday Scam Surge", "text": "Draw and resolve TWO scenario cards this round.", "effect": null}, {"title": "Phishing Simulation", "text": "Your own security team sends a test. Resolve the next scenario with no Funds penalty.", "effect": null}, {"title": "New-Starter Week", "text": "Every scenario this round targets the Intern / New Hire if possible.", "effect": null}, {"title": "Backups Verified", "text": "Reward: the next REPORT on a ransomware/malware scenario fully prevents it.", "effect": null}, {"title": "VIP Visit", "text": "Reputation is fragile — any TRUST mistake this round costs +5 extra Reputation.", "effect": null}]};</script>
<script>
(function(){
  const $ = (id)=>document.getElementById(id);
  const stage=$("stage"), hud=$("hud"), topbar=$("topbar"),
        counter=$("counter"), modePill=$("modePill"), foot=$("foot"),
        quitBtn=$("quitBtn");
  quitBtn.onclick=()=>{
    if(!confirm("Leave this game and return to the main menu? Your progress will be lost.")) return;
    showStart();
  };
  const M = GAME.meters, MK = ["R","M","S","X"];
  const N = GAME.meta.incidentsPerGame;
  let state = null;

  // ---------- helpers ----------
  function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
  function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
  function fmt(key,v){const m=M[key];return (m.prefix||"")+v+(m.unit||"");}

  // Build a round that uses every decision as the right answer at least once,
  // and caps any single best-decision so no one card (e.g. VERIFY) dominates.
  function buildDeck(){
    const all = GAME.scenarios, SIZE = Math.min(N, all.length), CAP = Math.max(3, Math.round(SIZE/4));
    const byBest = {};
    all.forEach(s => { (byBest[s.bestDecision] = byBest[s.bestDecision] || []).push(s); });
    const pick = [], used = new Set(), count = {};
    // one of each best-decision first (guarantees all five get used)
    shuffle(Object.keys(byBest)).forEach(b => {
      if (pick.length >= SIZE) return;
      const s = shuffle(byBest[b]).find(x => !used.has(x.id));
      if (s) { pick.push(s); used.add(s.id); count[b] = (count[b]||0) + 1; }
    });
    // fill the rest, respecting the per-decision cap
    for (const s of shuffle(all.filter(x => !used.has(x.id)))) {
      if (pick.length >= SIZE) break;
      if ((count[s.bestDecision]||0) < CAP) { pick.push(s); used.add(s.id); count[s.bestDecision] = (count[s.bestDecision]||0) + 1; }
    }
    // last resort if caps left us short
    for (const s of shuffle(all.filter(x => !used.has(x.id)))) {
      if (pick.length >= SIZE) break; pick.push(s); used.add(s.id);
    }
    return shuffle(pick);
  }

  function meterColor(key,v){
    const m=M[key];
    if(m.higherIsBetter){ if(v<=m.crit)return"bad"; if(v<=m.warn)return"warn"; return"good"; }
    else { if(v>=m.crit)return"bad"; if(v>=m.warn)return"warn"; return"good"; }
  }

  // ---------- HUD ----------
  function buildHUD(){
    hud.innerHTML = MK.map(k=>{
      const m=M[k];
      return `<div class="meter" id="meter-${k}">
        <div class="top"><span class="nm">${m.short}</span>
          <span><span class="val" id="val-${k}">0</span><span class="max"> /${m.max}</span></span></div>
        <div class="track"><div class="fill" id="fill-${k}"></div></div></div>`;
    }).join("");
  }
  function renderMeters(animate){
    MK.forEach(k=>{
      const v=state.meters[k], m=M[k];
      const pct=clamp((v-m.min)/(m.max-m.min)*100,0,100);
      const fill=$("fill-"+k), val=$("val-"+k);
      fill.style.width=pct+"%";
      fill.className="fill "+meterColor(k,v);
      val.textContent=fmt(k,v);
    });
  }
  function countTo(key,from,to){
    const el=$("val-"+key); if(!el)return;
    const dur=600, t0=performance.now();
    function step(t){const p=Math.min(1,(t-t0)/dur);
      const v=Math.round(from+(to-from)*(1-Math.pow(1-p,3)));
      el.textContent=fmt(key,v); if(p<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);
  }

  function applyDeltas(deltas){
    if(!deltas)return;
    Object.keys(deltas).forEach(k=>{
      const m=M[k], from=state.meters[k];
      const to=clamp(from+deltas[k],m.min,m.max);
      state.meters[k]=to;
      const fill=$("fill-"+k);
      if(fill){fill.style.width=clamp((to-m.min)/(m.max-m.min)*100,0,100)+"%";fill.className="fill "+meterColor(k,to);}
      countTo(k,from,to);
      const mt=$("meter-"+k); if(mt){mt.classList.remove("flash");void mt.offsetWidth;mt.classList.add("flash");}
    });
  }

  // Wrong calls amplify only the harmful side of an outcome, so a bad
  // decision bites harder while any silver lining stays intact.
  function amplifyHarm(deltas, multiplier){
    if(!deltas || multiplier===1) return deltas;
    const out={};
    Object.keys(deltas).forEach(k=>{
      const v=deltas[k], m=M[k];
      const harmful = m ? (m.higherIsBetter ? v<0 : v>0) : v<0;
      out[k] = harmful ? Math.round(v*multiplier) : v;
    });
    return out;
  }

  function deltaChips(deltas){
    if(!deltas||!Object.keys(deltas).length) return `<span class="delta flat">no change</span>`;
    const order=[["S","Sec"],["R","Rep"],["M","Funds"],["X","Stress"]];
    return order.filter(([k])=>deltas[k]!=null&&deltas[k]!==0).map(([k,lbl])=>{
      const v=deltas[k], up=v>0, good=M[k].higherIsBetter?up:!up;
      const unit=M[k].unit||"";
      return `<span class="delta ${good?"good":"bad"}">${lbl} ${up?"+":"\u2212"}${Math.abs(v)}${unit}</span>`;
    }).join("");
  }

  // ---------- screens ----------
  function showStart(){
    topbar.style.display="none"; hud.style.display="none";
    quitBtn.style.display="none";
    document.body.classList.remove("facilitator");
    const leg = MK.map(k=>`<span><b>${M[k].label}</b> ${M[k].hint.split(".")[0]}</span>`).join("");
    stage.innerHTML = `
      <div class="hero">
        <div class="eyebrow">Cyber-awareness \u00b7 card game</div>
        <h1>HUMAN <span class="fw">FIREWALL</span></h1>
        <div class="sub">Ten everyday incidents. Five ways to react. Keep the company standing.</div>
        <div class="modes">
          <button class="modebtn" data-mode="solo">
            <span class="ic">\u25b6</span>
            <span><span class="t">Play solo</span><br><span class="d">Train at your own pace and get a score.</span></span>
          </button>
          <button class="modebtn" data-mode="facilitator">
            <span class="ic">\u2318</span>
            <span><span class="t">Run a workshop</span><br><span class="d">A facilitator screen for a team or a room.</span></span>
          </button>
        </div>
        <div class="legend">${leg}</div>
      </div>`;
    foot.textContent = GAME.scenarios.length+" scenarios \u00b7 "+GAME.events.length+" event cards";
    stage.querySelectorAll(".modebtn").forEach(b=>b.onclick=()=>startGame(b.dataset.mode));
  }

  function startGame(mode){
    state={mode, incident:1, meters:{}, deck:buildDeck(), eventUsed:false};
    MK.forEach(k=>state.meters[k]=M[k].start);
    document.body.classList.toggle("facilitator", mode==="facilitator");
    topbar.style.display="flex"; hud.style.display="grid";
    quitBtn.style.display="inline-block";
    modePill.textContent = mode==="facilitator"?"FACILITATOR":"SOLO";
    buildHUD(); renderMeters(false);
    showScenario();
  }

  function curScenario(){return state.deck[state.incident-1];}

  function showScenario(){
    counter.innerHTML = `INCIDENT <b>${String(state.incident).padStart(2,"0")}</b> / ${N}`;
    const s=curScenario();
    const prompt = state.mode==="facilitator"
      ? "The team decides \u2014 play one card." : "What do you do?";
    const decs = GAME.decisions.filter(d=>s.outcomes[d.name]).map((d,i)=>`
      <button class="dec" data-dec="${d.name}" style="--dc:${d.color}">
        <span class="k">${i+1}</span>
        <span class="nm">${d.name}</span>
        <span class="mn">${d.meaning}</span>
      </button>`).join("");
    const facTools = state.mode==="facilitator" && !state.eventUsed ? `
      <div class="fac-tools"><button class="btn" id="drawEvent">Draw an event card</button></div>` : "";
    stage.innerHTML = `
      <div class="card">
        <span class="tag" style="background:${s.color}">${s.categoryLabel}</span>
        <div class="targets">Targets: ${s.targets}</div>
        <h2 class="scenario-title">${s.title}</h2>
        <p class="scenario-text">${s.text}</p>
        <p class="prompt">${prompt}</p>
        <div class="decisions">${decs}</div>
        ${facTools}
        <div id="eventSlot"></div>
      </div>`;
    stage.querySelectorAll(".dec").forEach(b=>b.onclick=()=>choose(b.dataset.dec));
    const de=$("drawEvent"); if(de) de.onclick=drawEvent;
  }

  function drawEvent(){
    const ev = GAME.events[Math.random()*GAME.events.length|0];
    state.eventUsed=true;
    const slot=$("eventSlot");
    const applyBtn = ev.effect ? `<div class="ea"><button class="btn primary" id="applyEvent">Apply effect</button></div>`
                               : `<div class="ea"><span class="mn" style="color:var(--muted);font-size:13px">Apply this as a rule for the round.</span></div>`;
    slot.innerHTML = `<div class="event-pop">
        <div class="et">Event card</div>
        <div class="en">${ev.title}</div>
        <div class="ex">${ev.text}</div>${applyBtn}</div>`;
    const ft=$("drawEvent"); if(ft)ft.parentElement.remove();
    const ab=$("applyEvent");
    if(ab) ab.onclick=()=>{applyDeltas(ev.effect);ab.outerHTML='<span class="mn" style="color:var(--good);font-size:13px">Applied.</span>';checkCrash();};
  }

  function choose(dec){
    const s=curScenario(), o=s.outcomes[dec], d=GAME.decisions.find(x=>x.name===dec);
    const aggravated = dec!==s.bestDecision;
    const deltas = aggravated ? amplifyHarm(o.deltas, GAME.meta.wrongAnswerPenalty) : o.deltas;
    applyDeltas(deltas);
    const last = state.incident>=N;
    const vmap={malicious:["mal","This was an attack"],legitimate:["leg","This was legitimate"],ambiguous:["amb","A judgment call"]};
    const vt=vmap[s.legitimacy]||vmap.malicious;
    const penaltyNote = aggravated ? `<div class="note penalty"><b>\u26a0 Wrong call.</b> The fallout hits harder than usual.</div>` : "";
    stage.innerHTML = `
      <div class="card">
        <div class="vtag ${vt[0]}">${vt[1]}</div>
        <div class="chosen">You chose \u00b7 <b style="--dc:${d.color};color:${d.color}">${dec}</b></div>
        <p class="outcome-text">${o.text}</p>
        ${penaltyNote}
        <div class="deltas">${deltaChips(deltas)}</div>
        <div class="note best"><b>Best move:</b> ${s.best}</div>
        <div class="note learn"><b>Learn:</b> ${s.learn}</div>
        <div class="actions">
          <button class="btn primary" id="next">${last?"See result":"Next incident"}</button>
        </div>
      </div>`;
    $("next").onclick=()=>{ if(checkCrash())return; advance(); };
  }

  function crashedMeter(){
    for(const k of MK){ const m=M[k], v=state.meters[k];
      if(m.higherIsBetter && v<=m.min) return k;
      if(!m.higherIsBetter && v>=m.max) return k;
    } return null;
  }
  function checkCrash(){ const k=crashedMeter(); if(k){ endGame(false,k); return true;} return false; }

  function advance(){
    if(state.incident>=N){ endGame(true,null); return; }
    state.incident++; state.eventUsed=false; showScenario();
  }

  function ratingFor(sec){ for(const r of GAME.ratings) if(sec>=r.min) return r; return GAME.ratings[GAME.ratings.length-1]; }

  function endGame(survived, crashKey){
    counter.innerHTML=""; quitBtn.style.display="none";
    const mt=state.meters;
    let won = survived;
    let reason="";
    if(!survived){
      const names={R:"reputation hit zero \u2014 the company's name is ruined",
                   M:"funds hit zero \u2014 the company is bankrupt",
                   S:"security hit zero \u2014 the company is wide open",
                   X:"stress hit the limit \u2014 the team burned out"};
      reason = "Breach: "+names[crashKey]+".";
      won=false;
    } else {
      const lines=[]; MK.forEach(k=>{ const m=M[k];
        const ok = m.higherIsBetter ? mt[k]>=m.winLine : mt[k]<=m.winLine;
        if(!ok) lines.push(m.label.toLowerCase());
      });
      if(lines.length){ won=false; reason="You made it through all "+N+" incidents, but "+lines.join(" and ")+" finished in the danger zone."; }
      else { reason="You cleared all "+N+" incidents with every meter in safe territory. That's a human firewall."; }
    }
    const rt = ratingFor(mt.S);
    const stars = won ? "\u2605".repeat(rt.stars)+"\u2606".repeat(3-rt.stars) : "\u2606\u2606\u2606";
    const finals = MK.map(k=>`<div class="fm"><div class="n">${M[k].short}</div><div class="v" style="color:var(--${meterColor(k,mt[k])})">${fmt(k,mt[k])}</div></div>`).join("");
    stage.innerHTML = `
      <div class="card verdict">
        <div class="stars" style="color:${won?"var(--good)":"var(--bad)"}">${stars}</div>
        <h2>${won?"Company secured":"Company breached"}</h2>
        <div class="rk">${won?rt.label:"incident response required"}</div>
        <p class="reason">${reason}</p>
        <div class="final">${finals}</div>
        <div class="actions">
          <button class="btn primary" id="again">Play again</button>
          <button class="btn ghost" id="home">Switch mode</button>
        </div>
      </div>`;
    $("again").onclick=()=>startGame(state.mode);
    $("home").onclick=showStart;
  }

  // keyboard 1-5 to choose during a scenario
  document.addEventListener("keydown",e=>{
    if(!state||state.mode==null)return;
    const n=parseInt(e.key,10);
    if(n>=1&&n<=5){ const b=stage.querySelectorAll(".dec")[n-1]; if(b)b.click(); }
  });

  showStart();
})();
</script>
</body>
</html>
