<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Human Firewall</title>
<style>
:root{
  --ink:#0b1623; --panel:#13243a; --panel2:#0f1d30; --line:#21364f;
  --text:#e7eef7; --muted:#8ea4c0; --accent:#4d8df0;
  --good:#34b36a; --bad:#e0564f; --warn:#e6a93c;
  --display: system-ui,"Segoe UI","Helvetica Neue",Arial,sans-serif;
  --mono: ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:radial-gradient(1200px 700px at 70% -10%,#16294180,transparent 60%),var(--ink);
  color:var(--text); font-family:var(--display);
  -webkit-font-smoothing:antialiased; line-height:1.5;
  min-height:100%;
}
button{font-family:inherit;color:inherit;cursor:pointer}
.wrap{max-width:760px;margin:0 auto;padding:18px 18px 40px;min-height:100vh;display:flex;flex-direction:column}
.mono{font-family:var(--mono);letter-spacing:.04em}

/* top bar */
.topbar{display:flex;align-items:center;gap:12px;padding:6px 2px 14px}
.brand{font-weight:800;letter-spacing:-.01em;font-size:15px}
.brand .fw{color:var(--accent)}
.pill{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);
  padding:3px 9px;border-radius:999px}
.counter{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
.counter b{color:var(--text)}

/* meter HUD */
.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.meter{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px 10px}
.meter .top{display:flex;justify-content:space-between;align-items:baseline}
.meter .nm{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.08em}
.meter .val{font-family:var(--mono);font-size:17px;font-weight:600;font-variant-numeric:tabular-nums}
.meter .max{font-size:10px;color:var(--muted)}
.track{height:6px;background:#0a1626;border-radius:99px;margin-top:8px;overflow:hidden;border:1px solid #0c1b2e}
.fill{height:100%;width:50%;border-radius:99px;transition:width .6s cubic-bezier(.2,.7,.2,1),background .3s}
.fill.good{background:linear-gradient(90deg,#2a8f57,var(--good))}
.fill.warn{background:linear-gradient(90deg,#c08a2a,var(--warn))}
.fill.bad{background:linear-gradient(90deg,#b63f3a,var(--bad))}
.meter.flash{animation:flash .6s ease}
@keyframes flash{0%{border-color:var(--accent)}100%{border-color:var(--line)}}

/* generic card */
.stage{flex:1;display:flex;flex-direction:column;justify-content:center}
.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
  border-radius:18px;padding:22px;animation:rise .45s cubic-bezier(.2,.7,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

/* start */
.hero{text-align:center;padding:14px 6px}
.hero h1{font-size:clamp(38px,9vw,62px);font-weight:800;letter-spacing:-.02em;margin:14px 0 6px;line-height:.98}
.hero h1 .fw{color:var(--accent)}
.hero .sub{color:var(--muted);font-size:16px;max-width:440px;margin:0 auto 26px}
.modes{display:grid;gap:12px;max-width:430px;margin:0 auto}
.modebtn{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:16px 18px;transition:border-color .2s,transform .12s,background .2s;display:flex;gap:14px;align-items:center}
.modebtn:hover{border-color:var(--accent);background:#16294a}
.modebtn:active{transform:translateY(1px)}
.modebtn .ic{font-family:var(--mono);font-weight:700;color:var(--accent);font-size:18px;
  width:38px;height:38px;flex:0 0 38px;display:grid;place-items:center;border:1px solid var(--line);border-radius:10px;background:#0d1c30}
.modebtn .t{font-weight:700;font-size:16px}
.modebtn .d{color:var(--muted);font-size:13px}
.legend{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:26px;
  font-family:var(--mono);font-size:11px;color:var(--muted)}
.legend span b{color:var(--text)}

/* scenario */
.tag{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:#fff;padding:4px 10px;border-radius:7px;font-weight:700}
.targets{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em;margin:14px 0 4px;text-transform:uppercase}
.scenario-title{font-size:clamp(22px,5vw,30px);font-weight:800;letter-spacing:-.01em;margin:0 0 12px;line-height:1.08}
.scenario-text{font-size:17px;color:#d6e1f0}
.prompt{margin:16px 0 4px;color:var(--muted);font-style:italic}
.decisions{display:grid;gap:8px;margin-top:16px}
.dec{display:flex;align-items:center;gap:13px;text-align:left;background:var(--panel);
  border:1px solid var(--line);border-left:4px solid var(--dc,#4d8df0);border-radius:11px;
  padding:12px 14px;transition:border-color .15s,background .15s,transform .1s}
.dec:hover{background:#16294a;border-color:var(--dc)}
.dec:active{transform:translateY(1px)}
.dec .k{font-family:var(--mono);font-size:11px;color:var(--muted);width:14px;text-align:center}
.dec .nm{font-weight:800;font-size:15px;letter-spacing:.02em;width:96px;flex:0 0 96px;color:var(--dc)}
.dec .mn{color:var(--muted);font-size:13px}

/* outcome */
.chosen{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.chosen b{color:var(--dc,#fff)}
.vtag{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;padding:4px 11px;border-radius:7px;margin-bottom:12px}
.vtag.mal{background:#3a1715;color:#ef8a83;border:1px solid #5a2420}
.vtag.leg{background:#10301f;color:#67d49a;border:1px solid #1d5234}
.vtag.amb{background:#2e2611;color:#e6c265;border:1px solid #5a4a1c}
.outcome-text{font-size:18px;margin:10px 0 14px}
.deltas{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.delta{font-family:var(--mono);font-size:12px;font-weight:700;padding:4px 9px;border-radius:7px}
.delta.good{background:#11331f;color:#62d195;border:1px solid #1c5232}
.delta.bad{background:#3a1715;color:#ef8a83;border:1px solid #5a2420}
.delta.flat{background:#16202e;color:var(--muted);border:1px solid var(--line)}
.note{border-radius:11px;padding:12px 14px;font-size:14px;margin-top:8px}
.note.best{background:#10301f;border:1px solid #1d5234}
.note.best b{color:#67d49a}
.note.learn{background:#2e2611;border:1px solid #5a4a1c;margin-top:9px}
.note.learn b{color:#e6c265}

/* actions */
.actions{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;text-align:center;border-radius:12px;padding:14px;font-weight:700;font-size:15px;border:1px solid var(--line);background:var(--panel);transition:.15s}
.btn:hover{border-color:var(--accent);background:#16294a}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#06101f}
.btn.primary:hover{background:#6aa1f4}
.btn.ghost{flex:0 0 auto;color:var(--muted)}

/* facilitator extras */
.fac-tools{display:flex;gap:10px;margin-top:14px}
.fac-tools .btn{flex:0 0 auto;font-size:13px;padding:10px 14px;color:var(--muted)}
.event-pop{margin-top:14px;background:#1a2236;border:1px solid #3a4a2e;border-left:4px solid var(--warn);border-radius:11px;padding:13px 15px}
.event-pop .et{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--warn);text-transform:uppercase}
.event-pop .en{font-weight:800;margin:3px 0 5px;font-size:16px}
.event-pop .ex{font-size:14px;color:#d6e1f0}
.event-pop .ea{margin-top:10px}
.evbanner{border-left:4px solid var(--warn);background:#161f30;border-radius:10px;padding:9px 13px;margin-bottom:12px;font-size:13px;color:#cdd9ea}
.evbanner b{color:#fff}
.ampnote{font-size:13px;border-radius:9px;padding:8px 12px;margin:0 0 12px;font-weight:600}
.ampnote.bad{background:#3a1715;color:#ef8a83;border:1px solid #5a2420}
.ampnote.good{background:#10301f;color:#67d49a;border:1px solid #1d5234}

/* end */
.verdict{text-align:center;padding:6px}
.verdict .stars{font-size:30px;letter-spacing:6px;margin:6px 0}
.verdict h2{font-size:clamp(28px,7vw,42px);font-weight:800;margin:6px 0 2px;letter-spacing:-.01em}
.verdict .rk{font-family:var(--mono);color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-size:13px}
.verdict .reason{color:var(--muted);margin:14px auto 18px;max-width:420px}
.final{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:18px 0}
.final .fm{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px}
.final .fm .n{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.06em}
.final .fm .v{font-family:var(--mono);font-size:22px;font-weight:600}

.foot{text-align:center;color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:22px;opacity:.7}

body.facilitator{--display: system-ui,"Segoe UI",sans-serif}
body.facilitator .wrap{max-width:920px}
body.facilitator .scenario-text{font-size:21px}
body.facilitator .scenario-title{font-size:clamp(26px,5vw,38px)}
body.facilitator .dec .nm{font-size:17px}
body.facilitator .outcome-text{font-size:22px}

/* team mode: turn banner */
.turnbanner{display:flex;align-items:baseline;gap:10px;background:linear-gradient(90deg,#16294a,var(--panel2));
  border:1px solid var(--accent);border-radius:12px;padding:10px 16px;margin-bottom:12px}
.turnbanner .who{font-weight:800;font-size:18px;letter-spacing:-0.01em}
.turnbanner .up{font-family:var(--mono);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
/* team mode: player setup */
.setup .roster{display:grid;gap:10px;max-width:430px;margin:0 auto 14px}
.roster-row{display:flex;align-items:center;gap:10px}
.roster-row .rn{flex:0 0 26px;text-align:center;color:var(--muted);font-size:13px}
.pinput{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--text);font-size:15px}
.pinput::placeholder{color:var(--muted);opacity:.7}
.pinput:focus-visible{border-color:var(--accent)}
.roster-row .rrm{flex:0 0 36px;height:36px;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--muted);font-size:18px;line-height:1}
.roster-row .rrm:hover:not(:disabled){border-color:var(--bad);color:var(--bad)}
.roster-row .rrm:disabled{opacity:.4;cursor:not-allowed}
.setup .addp{margin:0 auto 8px;display:block}
.setup .actions{margin-top:16px}
.btn:disabled{opacity:.45;cursor:not-allowed}
/* team mode: end scoreboard */
.scoreboard{max-width:430px;margin:22px auto 4px;text-align:left}
.scoreboard h3{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:0 0 8px}
.sb-row{display:flex;justify-content:space-between;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 13px;margin-bottom:6px}
.sb-name{font-weight:600}
.sb-score{font-size:13px;color:var(--muted)}
@media (max-width:560px){
  .hud{grid-template-columns:repeat(2,1fr)}
  .final{grid-template-columns:repeat(2,1fr)}
  .dec .nm{width:80px;flex-basis:80px}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar" id="topbar" style="display:none">
    <div class="brand">HUMAN <span class="fw">FIREWALL</span></div>
    <div class="pill mono" id="modePill">SOLO</div>
    <div class="counter mono" id="counter"></div>
  </div>

  <div class="hud" id="hud" style="display:none"></div>

  <div class="stage" id="stage"></div>

  <div class="foot" id="foot"></div>
</div>

<script>const GAME = {"meta": {"title": "Human Firewall", "subtitle": "A cyber-awareness card game", "incidentsPerGame": 20}, "meters": {"R": {"key": "R", "label": "Reputation", "short": "REP", "start": 70, "min": 0, "max": 100, "higherIsBetter": true, "winLine": 50, "warn": 50, "crit": 25, "hint": "Public & customer trust. Lose at 0."}, "M": {"key": "M", "label": "Funds", "short": "FUNDS", "start": 100, "min": 0, "max": 100, "higherIsBetter": true, "winLine": 1, "warn": 30, "crit": 15, "unit": "k", "prefix": "$", "hint": "Company money. Bankrupt at 0."}, "S": {"key": "S", "label": "Security", "short": "SEC", "start": 60, "min": 0, "max": 100, "higherIsBetter": true, "winLine": 40, "warn": 40, "crit": 20, "hint": "How hardened you are. Fully breached at 0."}, "X": {"key": "X", "label": "Stress", "short": "STRESS", "start": 30, "min": 0, "max": 100, "higherIsBetter": false, "winLine": 80, "warn": 60, "crit": 80, "hint": "Team pressure. Lower is better. Burnout at 100."}}, "ratings": [{"min": 80, "stars": 3, "label": "Human Firewall"}, {"min": 60, "stars": 2, "label": "Security-Aware"}, {"min": 40, "stars": 1, "label": "Getting There"}, {"min": 0, "stars": 0, "label": "At Risk"}], "decisions": [{"name": "TRUST", "color": "#b5292f", "meaning": "Do exactly what the message or caller asks. Comply with the request."}, {"name": "VERIFY", "color": "#1e7a3c", "meaning": "Independently confirm through a second, trusted channel before acting."}, {"name": "REPORT", "color": "#1e5fa8", "meaning": "Flag it to IT / Security (report-phishing button, ticket, or security@)."}, {"name": "ESCALATE", "color": "#6b3fa0", "meaning": "Hand the decision to a manager or security lead for approval."}], "scenarios": [{"id": 1, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Passwords", "title": "The Breach Notice", "targets": "Anyone", "text": "IT warns that a website where you used your work password has been breached. The same password also protects your work email.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You assume it’s fine and change nothing. Attackers reuse the password and break into your email.", "deltas": {"S": -30, "M": -15, "X": 20}}, "VERIFY": {"text": "You confirm the alert is really from IT, then realise the risk. Good caution.", "deltas": {"S": 5}}, "REPORT": {"text": "You tell security, who force a reset before anyone gets in.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "You ask IT to reset everywhere and switch on MFA and a password manager.", "deltas": {"S": 15, "M": -5, "X": -5}}}, "best": "ESCALATE / REPORT", "bestDecision": "ESCALATE", "learn": "One leaked password unlocks everything if you reuse it — use unique passwords and a password manager."}, {"id": 2, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "MFA Fatigue", "title": "Approve? Approve? Approve?", "targets": "Anyone", "text": "Your phone buzzes with login-approval requests over and over at 11pm — sign-ins you never started. One more pops up.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You tap Approve just to make it stop. The attacker is now inside your account.", "deltas": {"S": -30, "R": -5, "X": 20}}, "VERIFY": {"text": "You check the location and time, see it isn’t you, and deny it.", "deltas": {"S": 5}}, "REPORT": {"text": "You deny it and alert security. They lock the account and block the attacker.", "deltas": {"S": 15, "X": -5}}, "ESCALATE": {"text": "You call IT, who reset your credentials immediately.", "deltas": {"S": 10}}}, "best": "REPORT", "bestDecision": "REPORT", "learn": "Never approve a login prompt you didn’t start — repeated prompts are an attack. Deny and report."}, {"id": 3, "category": "MOBILE", "categoryLabel": "On the Go", "color": "#c2710c", "type": "QR Scam", "title": "Scan to Pay", "targets": "Anyone", "text": "A sticker on the office parking meter reads “Scan to pay / update card details.” The QR code opens a payment page.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You scan and enter your card. The details are stolen on a fake page.", "deltas": {"M": -20, "S": -15, "X": 15}}, "VERIFY": {"text": "You use the meter’s official app instead of the sticker. Safe.", "deltas": {"S": 5}}, "REPORT": {"text": "You tell facilities/security. The fake sticker is removed and others are protected.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "Facilities investigate where the sticker came from.", "deltas": {"S": 5}}}, "best": "REPORT", "bestDecision": "REPORT", "learn": "A QR code hides where it really goes — don’t scan random ones in public; use the official app or site."}, {"id": 4, "category": "MONEY", "categoryLabel": "Money & Payments", "color": "#b5292f", "type": "Invoice Fraud", "title": "The Bank Details Changed", "targets": "Finance Officer", "text": "A known supplier emails a normal-looking invoice, with a note: “Please note our bank account has changed — pay the new account below.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You pay the new account. The money goes straight to a fraudster.", "deltas": {"M": -35, "R": -15, "X": 20}}, "VERIFY": {"text": "You call the supplier on the number you already have. The change is fake.", "deltas": {"S": 5}}, "REPORT": {"text": "You flag it to security and finance. The fraud is caught and others are warned.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "Dual approval catches the mismatch before payment.", "deltas": {"X": 5}}}, "best": "VERIFY (call a known number)", "bestDecision": "VERIFY", "learn": "Always confirm changed bank details by calling a number you already trust — never the one on the invoice."}, {"id": 5, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "USB Drop", "title": "The Found Drive", "targets": "Anyone", "text": "You find a USB stick in the car park labelled “Payroll 2025 — Confidential.” Curiosity says plug it in.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You plug it in. Malware runs automatically and spreads onto the network.", "deltas": {"S": -30, "M": -15, "X": 20}}, "VERIFY": {"text": "There’s no safe way to ‘check’ it by plugging in — you treat it as suspicious.", "deltas": {"S": 5}}, "REPORT": {"text": "You hand it to IT, who examine it safely in isolation.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "IT investigate a possible ‘USB drop’ targeting the office.", "deltas": {"S": 10}}}, "best": "REPORT", "bestDecision": "REPORT", "learn": "‘USB drop’ attacks bait your curiosity — never plug in a drive you found. Hand it to IT."}, {"id": 6, "category": "VOICE", "categoryLabel": "Phone & Voice", "color": "#6b3fa0", "type": "Deepfake Call", "title": "The CEO’s Voice", "targets": "Finance Officer / Admin", "text": "A call comes in. It sounds exactly like the CEO: “I’m in a meeting — move €40,000 to this account right now, and keep it quiet.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You make the transfer. The voice was AI-cloned; the funds are gone.", "deltas": {"M": -35, "R": -15, "X": 30}}, "VERIFY": {"text": "You call the CEO back on a known number (or use your code word). It’s fake.", "deltas": {"S": 5}}, "REPORT": {"text": "You flag the attempt to security. The team is warned about voice-clone fraud.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "You require the normal payment-approval process, which stops it.", "deltas": {"X": 5}}}, "best": "VERIFY (call back on a trusted number)", "bestDecision": "VERIFY", "learn": "AI can clone a voice. Urgency + secrecy + money is the scam pattern — always verify on a known channel."}, {"id": 7, "category": "SOCIAL", "categoryLabel": "Social & Online", "color": "#b83280", "type": "Oversharing", "title": "The Helpful Post", "targets": "Intern / New Hire", "text": "An intern proudly posts a first-day photo — their screen, their badge, and “Can’t believe how easy our new vendor portal login is!”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "The post stays up. Attackers harvest the details for a targeted phishing attack.", "deltas": {"S": -15, "R": -5, "X": 5}}, "VERIFY": {"text": "You check exactly what’s visible in the photo first.", "deltas": {"S": 5}}, "REPORT": {"text": "You quietly flag it; the post is taken down and friendly guidance is given.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "You ask a manager to clarify the social-media policy for everyone.", "deltas": {"S": 5}}}, "best": "REPORT (and coach them)", "bestDecision": "REPORT", "learn": "Badges, screens and ‘behind the scenes’ posts leak details attackers use. Think before you post."}, {"id": 8, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Ransomware", "title": "Your Files Are Locked", "targets": "Anyone", "text": "A red full-screen message appears: “All your files are encrypted. Pay $2,000 in crypto within 48 hours or lose everything.” A colleague says “just pay it!”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You pay the ransom. There’s no guarantee of recovery — and you’re now a known payer.", "deltas": {"M": -35, "S": -15, "X": 30}}, "VERIFY": {"text": "You don’t negotiate alone — you get help before doing anything.", "deltas": {}}, "REPORT": {"text": "You disconnect the device and call IT at once. The spread is contained; backups restore the files.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "Incident response and leadership coordinate a clean recovery — no payment.", "deltas": {"S": 15, "M": -5}}}, "best": "REPORT (disconnect & call IT)", "bestDecision": "REPORT", "learn": "Don’t pay and don’t panic — isolate the device and call IT. Good backups beat ransoms."}, {"id": 9, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Compromised Account", "title": "Send Me Payroll", "targets": "HR Manager / Finance", "text": "A Microsoft Teams message from your manager’s account: “Hey, can you send me the payroll spreadsheet urgently? I’m boarding a flight.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You send the file. The account was hijacked — employee data is leaked.", "deltas": {"R": -20, "S": -20, "X": 20}}, "VERIFY": {"text": "You reach your manager another way and learn their account was compromised.", "deltas": {"S": 10}}, "REPORT": {"text": "You flag the account to IT, who secure it before more damage is done.", "deltas": {"S": 15, "X": -5}}, "ESCALATE": {"text": "Manager and security are looped in and the account is locked.", "deltas": {"S": 10}}}, "best": "VERIFY, then REPORT", "bestDecision": "VERIFY", "learn": "Even a trusted account can be hijacked — verify unusual data requests through another channel."}, {"id": 10, "category": "SOCIAL", "categoryLabel": "Social & Online", "color": "#b83280", "type": "Impersonation", "title": "A Message from the Boss", "targets": "Anyone", "text": "A brand-new account using the CEO’s name and photo messages staff: “I need your mobile number for a quick confidential task.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You reply and help, and get drawn into a gift-card / transfer scam.", "deltas": {"M": -15, "R": -5, "X": 15}}, "VERIFY": {"text": "You confirm with the CEO’s real contact — the account is fake.", "deltas": {"S": 5}}, "REPORT": {"text": "You report the impersonation; the account is taken down and staff are warned.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "Comms and security alert all staff to the fake account.", "deltas": {"S": 10}}}, "best": "REPORT", "bestDecision": "REPORT", "learn": "Impersonation accounts copy names and photos — verify identity before acting on ‘confidential’ asks."}, {"id": 11, "category": "VOICE", "categoryLabel": "Phone & Voice", "color": "#6b3fa0", "type": "Vishing", "title": "IT Support Calling", "targets": "Anyone", "text": "A caller says: “This is IT — we’ve found a virus on your PC. I’ll walk you through installing a fix; just grant me remote access.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You install the ‘fix’ and grant access. The caller now controls your PC.", "deltas": {"S": -30, "X": 20}}, "VERIFY": {"text": "You hang up and call IT on the number you know. There’s no such ticket.", "deltas": {"S": 5}}, "REPORT": {"text": "You report the call so security can warn others.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "IT investigate the spoofed support call.", "deltas": {"S": 5}}}, "best": "VERIFY (call IT back yourself)", "bestDecision": "VERIFY", "learn": "Real IT won’t cold-call you for remote access — hang up and call the number you already know."}, {"id": 12, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Shadow IT", "title": "There’s an App for That", "targets": "Salesperson / Anyone", "text": "To work faster, a teammate suggests uploading the full client list to a free online tool they found to ‘clean it up.’", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You upload the data. The client list is now in the hands of an unknown third party.", "deltas": {"R": -15, "S": -15, "X": 5}}, "VERIFY": {"text": "You check with IT whether the tool is approved — it isn’t, so you find a safe option.", "deltas": {"S": 5}}, "REPORT": {"text": "You ask IT to vet it; they approve a safe alternative.", "deltas": {"S": 10}}, "ESCALATE": {"text": "IT review and provide a sanctioned tool.", "deltas": {"S": 10}}}, "best": "VERIFY / ESCALATE with IT", "bestDecision": "VERIFY", "learn": "Free ‘helpful’ tools can harvest your data — check with IT before uploading any company information."}, {"id": 13, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Malware Doc", "title": "Enable Content to View", "targets": "Anyone", "text": "An attachment, “Invoice.docx,” opens to a banner: “Protected view — Enable Content to see this document.”", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You enable content. Hidden macro malware runs on your machine.", "deltas": {"S": -30, "X": 20}}, "VERIFY": {"text": "You weren’t expecting it, so you don’t enable anything and check the sender.", "deltas": {"S": 5}}, "REPORT": {"text": "You report it as phishing; the sender is blocked.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "IT examine the file in a safe environment.", "deltas": {"S": 5}}}, "best": "REPORT (don’t enable content)", "bestDecision": "REPORT", "learn": "‘Enable content’ on an unexpected document can run hidden malware — when in doubt, report it."}, {"id": 14, "category": "MOBILE", "categoryLabel": "On the Go", "color": "#c2710c", "type": "Lost Device", "title": "Left on the Train", "targets": "Salesperson", "text": "You realise your work laptop — logged in and full of client data — was left on the train.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You wait and hope it turns up. The data is exposed if the wrong person finds it.", "deltas": {"R": -15, "S": -15, "X": 20}}, "VERIFY": {"text": "You retrace your steps and check lost property — but every minute counts.", "deltas": {"X": 5}}, "REPORT": {"text": "You tell IT immediately; they remote-lock and wipe it before anyone can access it.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "IT and your manager handle containment and any disclosure.", "deltas": {"S": 10}}}, "best": "REPORT (fast, so IT can wipe it)", "bestDecision": "REPORT", "learn": "Report lost devices immediately — a quick remote lock or wipe turns a disaster into a non-event."}, {"id": 15, "category": "VOICE", "categoryLabel": "Phone & Voice", "color": "#6b3fa0", "type": "Pretexting", "title": "From the New Auditor", "targets": "HR Manager / Finance", "text": "A polite caller claims to be a new external auditor and asks you to email a list of all staff names, emails and job titles ‘for the audit.’", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You send the list. It’s used to build a convincing mass-phishing campaign.", "deltas": {"R": -5, "S": -20, "X": 15}}, "VERIFY": {"text": "You confirm with your own finance/audit contact — there is no such auditor.", "deltas": {"S": 10}}, "REPORT": {"text": "You report the call; staff are warned of the pretext.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "A manager verifies whether any audit is actually engaged.", "deltas": {"S": 5}}}, "best": "VERIFY (through your own contact)", "bestDecision": "VERIFY", "learn": "‘Officials’ who pressure you for staff data are a classic pretext — verify through a contact you already trust."}, {"id": 16, "category": "MONEY", "categoryLabel": "Money & Payments", "color": "#b5292f", "type": "Legitimate Invoice", "title": "The Monthly Invoice", "targets": "Finance Officer", "text": "A regular monthly invoice lands in the accounts inbox from a supplier you’ve used for years. Same bank details as always, the usual amount, and it matches an existing purchase order.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You pay it through the normal process. The supplier is paid on time and the relationship stays healthy.", "deltas": {"R": 5}}, "VERIFY": {"text": "You quickly match it against the purchase order before paying. Prudent — costs a moment.", "deltas": {"X": 5}}, "REPORT": {"text": "You flag it as fraud. Security investigates, finds nothing, and a real supplier is left waiting.", "deltas": {"R": -5, "X": 15}}, "ESCALATE": {"text": "You bump a routine payment up the chain. Fine, just slower than it needed to be.", "deltas": {"X": 5}}}, "best": "TRUST (pay via the normal process)", "bestDecision": "TRUST", "learn": "Not everything is an attack. A known supplier, normal channel, unchanged details and a matching PO are signs it’s genuine — and paying on time matters too."}, {"id": 17, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Genuine IT Notice", "title": "Patch Tonight", "targets": "Anyone", "text": "A message in the official IT channel says a security update will install automatically tonight. No action needed, no links, and it never asks for your password.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You let it run. Your machine stays patched and protected.", "deltas": {"S": 10}}, "VERIFY": {"text": "You confirm it really came from the IT channel. Quick and sensible.", "deltas": {}}, "REPORT": {"text": "You report it as phishing. Security spends time confirming their own genuine notice.", "deltas": {"X": 15}}, "ESCALATE": {"text": "You escalate a routine notice. Unnecessary, but harmless.", "deltas": {"X": 5}}}, "best": "TRUST (no links, no credentials, official channel)", "bestDecision": "TRUST", "learn": "Real IT messages come through official channels and never ask for passwords or urgent clicks. Spotting a genuine notice avoids alarm fatigue."}, {"id": 18, "category": "PHYSICAL", "categoryLabel": "Physical & In-Person", "color": "#8a5a2b", "type": "Real Onboarding", "title": "The First Morning", "targets": "Intern / New Hire / HR", "text": "On the new hire’s first morning, HR sits with them and sets up payroll directly inside the official HR system — in person, no emails, no external links.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "Payroll is set up correctly and securely. A smooth start.", "deltas": {"S": 5}}, "VERIFY": {"text": "The new hire double-checks they’re in the real HR system. Good habit.", "deltas": {}}, "REPORT": {"text": "They report their own legitimate onboarding. Awkward, and it stalls their setup.", "deltas": {"X": 15}}, "ESCALATE": {"text": "Unnecessary for a normal in-person setup.", "deltas": {"X": 5}}}, "best": "TRUST (in person, official system, no links)", "bestDecision": "TRUST", "learn": "Compare this with the fake ‘confirm your bank details’ email: official system, in person, no links. Context separates real from fake."}, {"id": 19, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Verified Customer", "title": "Their Own Account", "targets": "Salesperson / Admin", "text": "A customer, logged in and identity-verified through your official support portal, asks for a copy of their own account information.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You provide it through the portal. Good service, happy customer.", "deltas": {"R": 5}}, "VERIFY": {"text": "Their identity is already confirmed by the portal, but a quick check doesn’t hurt.", "deltas": {"X": 5}}, "REPORT": {"text": "You treat a verified customer as a threat. Security finds nothing and the customer is frustrated.", "deltas": {"R": -5, "X": 5}}, "ESCALATE": {"text": "You pass a routine, verified request up the line. Slower service than needed.", "deltas": {"X": 5}}}, "best": "TRUST (identity verified through the official portal)", "bestDecision": "TRUST", "learn": "Security shouldn’t block legitimate service. Verified identity through an official channel means you can help with confidence."}, {"id": 20, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Routine Request", "title": "The Weekly Report", "targets": "Anyone", "text": "Your manager, in your usual work chat thread, asks you to send over a non-sensitive document the two of you share every week.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You send it. Normal request, normal channel — work moves along.", "deltas": {}}, "VERIFY": {"text": "You insist on verifying a routine, non-sensitive request. It’s safe, but it slows things and signals distrust.", "deltas": {"R": -5, "X": 5}}, "REPORT": {"text": "You report your own manager’s normal request. Confusing for everyone.", "deltas": {"R": -5, "X": 15}}, "ESCALATE": {"text": "You escalate a routine request — unnecessary friction.", "deltas": {"X": 5}}}, "best": "TRUST (normal channel, normal request, nothing sensitive)", "bestDecision": "TRUST", "learn": "Constant suspicion of normal requests grinds work to a halt. Save verification for the red flags: urgency, secrecy, sensitive data, or an unusual channel."}, {"id": 21, "category": "MONEY", "categoryLabel": "Money & Payments", "color": "#b5292f", "type": "Unusual Invoice", "title": "The Urgent Invoice", "targets": "Finance Officer", "text": "An invoice from a known supplier arrives — bank details unchanged, but the amount is noticeably higher than usual and the tone is pushier and more urgent than their normal emails.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You pay it as-is. The figure was padded from a compromised supplier mailbox — partly avoidable.", "deltas": {"M": -20, "X": 15}}, "VERIFY": {"text": "One call to the supplier on a known number clears it up before any money moves.", "deltas": {"S": 5}}, "REPORT": {"text": "You escalate to security. A bit heavy for one odd detail, but no harm.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You route it for a second approval — reasonable for an unusual amount.", "deltas": {"S": 5}}}, "best": "VERIFY — one quick call resolves the doubt", "bestDecision": "VERIFY", "learn": "When something is mostly normal but one detail is off (amount, tone, urgency), a 30-second check beats both blindly paying and crying fraud."}, {"id": 22, "category": "SOCIAL", "categoryLabel": "Social & Online", "color": "#b83280", "type": "Possible Lure", "title": "Recruiter in Your Inbox", "targets": "Anyone", "text": "A recruiter messages you with a plausible-looking role and asks you to send your CV and contact details. It might be a real opportunity — or a way to harvest your information.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You send a full CV with personal details to an unverified stranger. Possibly fine, possibly harvested.", "deltas": {"S": -5, "X": 5}}, "VERIFY": {"text": "You check the recruiter’s profile and the company before sharing anything. Sensible.", "deltas": {}}, "REPORT": {"text": "You report it. If it was genuine, you may have flagged a real recruiter — minor noise.", "deltas": {"X": 5}}, "ESCALATE": {"text": "Not really an escalation matter.", "deltas": {"X": 5}}}, "best": "VERIFY (check the profile and company first)", "bestDecision": "VERIFY", "learn": "Not malicious by default, not safe by default. Verify the source before handing over personal information."}, {"id": 23, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Re-auth Prompt", "title": "Sign In Again", "targets": "Anyone", "text": "Right after a genuine software update, an app asks you to sign in again. It could be a normal re-authentication — or a fake prompt placed to catch your password.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You type your password straight into the popup. If it was fake, it’s now stolen.", "deltas": {"S": -15, "X": 15}}, "VERIFY": {"text": "You close the popup and sign in by opening the app yourself. Safe either way.", "deltas": {"S": 5}}, "REPORT": {"text": "You report it. If real, a little noise; no harm done.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You ask IT — fine, if a touch slow.", "deltas": {"X": 5}}}, "best": "VERIFY (sign in through the app yourself, not the popup)", "bestDecision": "VERIFY", "learn": "Re-auth prompts are often real — but only ever enter credentials somewhere you navigated to yourself."}, {"id": 24, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Unexpected Link", "title": "Did You Send This?", "targets": "Anyone", "text": "A coworker drops a document link in chat. You weren’t expecting it, but it’s plausibly work-related and they often share files.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You click it. Their account had been hijacked and the link was malicious — partly avoidable.", "deltas": {"S": -15, "X": 15}}, "VERIFY": {"text": "A quick ‘did you send this?’ confirms it before you click. Two seconds well spent.", "deltas": {"S": 5}}, "REPORT": {"text": "You report it without asking. If genuine, a small false alarm.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You loop in IT — a bit much before a simple check.", "deltas": {"X": 5}}}, "best": "VERIFY (a quick ‘did you send this?’)", "bestDecision": "VERIFY", "learn": "Even real colleagues get hijacked. A two-second check before clicking an unexpected link costs nothing."}, {"id": 25, "category": "VOICE", "categoryLabel": "Phone & Voice", "color": "#6b3fa0", "type": "Press Enquiry", "title": "The Journalist Calls", "targets": "Receptionist / Admin / Executive", "text": "A journalist phones and asks you to confirm whether the company suffered a data breach last week. You’re not certain, and it isn’t your place to speak for the company.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You comment on the company’s behalf without authority — your words become the story.", "deltas": {"R": -20, "X": 15}}, "VERIFY": {"text": "You can’t verify a breach yourself, and that isn’t the point.", "deltas": {"X": 5}}, "REPORT": {"text": "You file an IT ticket — wrong channel. This is a comms and leadership matter.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You take a message and pass it straight to management / comms. Exactly right.", "deltas": {"R": 5}}}, "best": "ESCALATE (to management / comms)", "bestDecision": "ESCALATE", "learn": "Press, legal and regulator questions go straight to management — never improvise on the company’s behalf, and never just sit on them."}, {"id": 26, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Official Request", "title": "A Request for Records", "targets": "HR Manager / Finance", "text": "A request arrives — confirmed genuine through proper channels — from a regulator asking for a set of customer records. It’s real, but releasing customer data is a big, high-stakes step.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "Even though it’s genuine, you release customer data on your own authority — a serious overstep.", "deltas": {"R": -15, "S": -15, "X": 15}}, "VERIFY": {"text": "Confirming it’s real is wise — but once it is, you still must escalate, not act alone.", "deltas": {"X": 5}}, "REPORT": {"text": "This isn’t a phishing report; it needs an authority decision.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You route it to management / legal / your data-protection lead for sign-off. Correct.", "deltas": {"S": 5}}}, "best": "ESCALATE (for the right sign-off)", "bestDecision": "ESCALATE", "learn": "Even a legitimate request for sensitive data needs proper authorisation. Confirm it’s real, then escalate — don’t release data solo."}, {"id": 27, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Insider Risk", "title": "Working From Home", "targets": "Anyone / IT", "text": "You notice a teammate routinely emailing unencrypted customer spreadsheets to their personal Gmail so they can work from home. They’re not malicious — just careless.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You decide it’s none of your business — and quietly condone the risk.", "deltas": {"S": -15}}, "VERIFY": {"text": "There’s nothing to verify; the behaviour is plain to see.", "deltas": {"X": 5}}, "REPORT": {"text": "You open a formal security incident on a careless but well-meaning colleague — heavier than it needs to be.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You raise it calmly with your manager / security, so it’s handled and the person gets support.", "deltas": {"S": 10}}}, "best": "ESCALATE (raise it through the right channel)", "bestDecision": "ESCALATE", "learn": "Insider mistakes are a people problem, not a phishing report. Raise them through your manager or security so they’re handled constructively."}, {"id": 28, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Privilege Request", "title": "The Access Request", "targets": "IT / Developer", "text": "A new manager asks — politely, through the proper ticket system — for full admin access to a sensitive system ‘to do their job.’ The request looks legitimate and follows process, but it’s a big privilege to grant.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You hand over broad admin access with no review — a real exposure, however well-meant.", "deltas": {"S": -20, "X": 15}}, "VERIFY": {"text": "Confirming identity is fine, but the real question is how much access is appropriate.", "deltas": {"X": 5}}, "REPORT": {"text": "Nothing here to report — it isn’t a threat, it’s an authorisation call.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You route it to the system owner for a least-privilege review and approval. Exactly how big grants should work.", "deltas": {"S": 10}}}, "best": "ESCALATE (for least-privilege approval)", "bestDecision": "ESCALATE", "learn": "Genuine-looking, high-impact requests still need the right approval. Escalate big access grants for review rather than granting — or blocking — them yourself."}, {"id": 29, "category": "MONEY", "categoryLabel": "Money & Payments", "color": "#b5292f", "type": "Extortion", "title": "A Quiet Demand", "targets": "Anyone / Executive", "text": "An email addressed to you personally threatens to leak company data unless you arrange a payment quietly, today. It feels aimed and credible.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You engage and arrange payment alone — funding a criminal with no guarantee of anything.", "deltas": {"M": -30, "X": 20}}, "VERIFY": {"text": "There’s no safe way to ‘check’ an extortion demand yourself.", "deltas": {"X": 5}}, "REPORT": {"text": "Logging it helps, but a threat like this needs leadership and incident response, not just a ticket.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You take it straight to leadership and incident response. The right people respond as a team.", "deltas": {"S": 5}}}, "best": "ESCALATE (to leadership / incident response)", "bestDecision": "ESCALATE", "learn": "A credible threat against the company goes to leadership and incident response fast — don’t pay, don’t negotiate, and don’t sit on it alone."}, {"id": 30, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Genuine IT Follow-up", "title": "The Replacement Laptop", "targets": "Anyone", "text": "IT emails — referencing the support ticket you opened last week — to say your replacement laptop is ready. Bring your badge to the IT desk to collect it. No links, no password requested.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You collect it from the IT desk. Sorted — it was your own ticket.", "deltas": {"S": 5}}, "VERIFY": {"text": "You double-check with IT, who confirm what you already knew. Minor delay.", "deltas": {"X": 5}}, "REPORT": {"text": "You report a reply to your own ticket as phishing. Security closes it as a false alarm.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You escalate a routine collection. Unnecessary.", "deltas": {"X": 5}}}, "best": "TRUST (it references your own ticket and asks for nothing)", "bestDecision": "TRUST", "learn": "A message that follows up on something you started, and asks for no credentials, is a strong sign it’s genuine."}, {"id": 31, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Routine Invite", "title": "The Project Invite", "targets": "Anyone", "text": "A meeting invite arrives from a teammate you work with daily, for the project you’re both on, at a normal time, from their usual address, with the standard Teams link.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You accept and join. A normal invite for real work.", "deltas": {}}, "VERIFY": {"text": "You quiz your teammate about a routine invite. Safe, but it slows you both down.", "deltas": {"X": 5}}, "REPORT": {"text": "You report a colleague’s normal meeting invite. Confusing for everyone.", "deltas": {"R": -5, "X": 5}}, "ESCALATE": {"text": "You escalate a calendar invite. Overkill.", "deltas": {"X": 5}}}, "best": "TRUST (known colleague, real project, normal channel)", "bestDecision": "TRUST", "learn": "Reserve suspicion for unexpected links from unexpected people — routine invites from known colleagues are just work."}, {"id": 32, "category": "MONEY", "categoryLabel": "Money & Payments", "color": "#b5292f", "type": "Genuine Approval", "title": "The Approved Expense", "targets": "Anyone", "text": "Finance emails from the internal finance address, through the expense system you always use, to say your travel claim is approved and will be paid on Friday.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You note it and carry on. Correct — it’s your own claim, through the right system.", "deltas": {}}, "VERIFY": {"text": "You check with finance about your own approved claim. Harmless, slightly wasteful.", "deltas": {"X": 5}}, "REPORT": {"text": "You report finance’s genuine approval as fraud. They’re unimpressed.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You escalate a routine approval. No need.", "deltas": {"X": 5}}}, "best": "TRUST (your own claim, internal system)", "bestDecision": "TRUST", "learn": "Confirmations of things you initiated, through the systems you already use, are normal — not every money email is fraud."}, {"id": 33, "category": "MONEY", "categoryLabel": "Money & Payments", "color": "#b5292f", "type": "Unchanged Details", "title": "The Matching Bank Details", "targets": "Finance Officer", "text": "A supplier emails to confirm the bank details for an upcoming payment. You compare them: they exactly match what’s already on file. Nothing is being changed.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You proceed using the on-file details. Correct — nothing changed, no fraud signal.", "deltas": {}}, "VERIFY": {"text": "You call to confirm details that already match the file. Prudent, but it delays a clean payment.", "deltas": {"X": 5}}, "REPORT": {"text": "You raise fraud where nothing changed. Security finds nothing; the supplier waits.", "deltas": {"R": -5, "X": 5}}, "ESCALATE": {"text": "You escalate a routine, unchanged payment. Slower than it needed to be.", "deltas": {"X": 5}}}, "best": "TRUST (details match the file; nothing changed)", "bestDecision": "TRUST", "learn": "The fraud signal is a *change* of details under pressure. Matching, on-file details with no change request are normal — don’t freeze every payment."}, {"id": 34, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Genuine Internal Email", "title": "The Training Reminder", "targets": "Anyone", "text": "An internal email from your security team reminds everyone to finish annual training by month-end. It links to the internal training portal on your company domain that you’ve used before.", "legitimacy": "legitimate", "outcomes": {"TRUST": {"text": "You complete the training via the portal you know. Done.", "deltas": {"S": 5}}, "VERIFY": {"text": "You confirm the link — it’s the internal portal. Fine.", "deltas": {}}, "REPORT": {"text": "You report your own security team’s reminder. They sigh.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You escalate a training nudge. Unnecessary.", "deltas": {"X": 5}}}, "best": "TRUST (internal portal you already use)", "bestDecision": "TRUST", "learn": "Genuine internal comms use internal systems you recognise — learn to tell them from look-alikes rather than flagging everything."}, {"id": 35, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Look-alike Phishing", "title": "The Shared Document", "targets": "Anyone", "text": "An email looks like a ‘document shared with you’ notice — ‘Q3 Budget’ from a name close to a colleague’s. But the sharing address is an outside domain and the link leaves your company’s systems.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You sign in to ‘view’ it. Your credentials are captured on a look-alike page.", "deltas": {"S": -30, "X": 20}}, "VERIFY": {"text": "You hover the link and check with the colleague — they never shared it.", "deltas": {"S": 5}}, "REPORT": {"text": "You report it; the look-alike sender is blocked before others fall for it.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "You loop in a manager — fine, though reporting is the faster path.", "deltas": {"X": 5}}}, "best": "REPORT (off-platform link from an outside domain)", "bestDecision": "REPORT", "learn": "Fake ‘shared a document’ notices copy the real ones. Check the sender domain and where the link goes — when it’s external, report it."}, {"id": 36, "category": "MONEY", "categoryLabel": "Money & Payments", "color": "#b5292f", "type": "Fraud on a Real Name", "title": "The Half-Familiar Invoice", "targets": "Finance Officer", "text": "An invoice references a real supplier and a real project — but you never ordered this, and the PO number matches no order on file. It’s a fake riding on a genuine relationship.", "legitimacy": "malicious", "outcomes": {"TRUST": {"text": "You pay it. The money goes to a fraudster trading on a real supplier’s name.", "deltas": {"M": -35, "R": -15, "X": 20}}, "VERIFY": {"text": "You check the PO and find no matching order. Good catch.", "deltas": {"S": 5}}, "REPORT": {"text": "You report the fraud pattern so colleagues hit by the same scam are warned.", "deltas": {"S": 10, "X": -5}}, "ESCALATE": {"text": "You raise it with finance leadership — reasonable for suspected fraud.", "deltas": {"S": 5}}}, "best": "REPORT (no matching PO — warn others)", "bestDecision": "REPORT", "learn": "Fake invoices latch onto real supplier names; a missing or wrong PO is the tell. Report it so the campaign is flagged for everyone."}, {"id": 37, "category": "EMAIL", "categoryLabel": "Email & Messages", "color": "#1e5fa8", "type": "Confidential Disclosure", "title": "The Partner’s Question", "targets": "Executive / Admin", "text": "Someone from a partner company asks — plausibly and politely — for confidential details of the upcoming deal ‘so we can prepare our side.’ You’re not sure what’s been agreed or who’s cleared to share it.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You share the deal details. Confidential terms leak before anything’s authorised.", "deltas": {"R": -20, "S": -15, "X": 20}}, "VERIFY": {"text": "You confirm the person is real — but the real question is whether you’re allowed to disclose at all.", "deltas": {"X": 5}}, "REPORT": {"text": "A phishing ticket doesn’t fit — this is a disclosure-authority question.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You route it to the deal owner / management to decide what can be shared. Right call.", "deltas": {"S": 5}}}, "best": "ESCALATE (disclosure isn’t yours to authorise)", "bestDecision": "ESCALATE", "learn": "Confidential business information needs the owner’s decision — escalate, even when the person asking is genuine."}, {"id": 38, "category": "PHYSICAL", "categoryLabel": "Physical & In-Person", "color": "#8a5a2b", "type": "Whistleblowing", "title": "The Quiet Word", "targets": "Anyone", "text": "A colleague quietly tells you they think a manager is fudging the numbers, and asks you to keep it strictly between you two.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You agree to keep it secret and do nothing. Possible fraud goes unaddressed — and now you’re sitting on it.", "deltas": {"S": -15, "R": -5, "X": 15}}, "VERIFY": {"text": "You start digging into the manager yourself — not your role, and risky.", "deltas": {"X": 15}}, "REPORT": {"text": "A security ticket isn’t the right channel for suspected fraud.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You raise it through the proper escalation / whistleblowing channel, in confidence.", "deltas": {"S": 5}}}, "best": "ESCALATE (through the whistleblowing channel)", "bestDecision": "ESCALATE", "learn": "Suspected wrongdoing goes through the proper confidential channel — don’t investigate it yourself, and don’t bury it."}, {"id": 39, "category": "MONEY", "categoryLabel": "Money & Payments", "color": "#b5292f", "type": "Beyond Your Authority", "title": "The Angry Refund", "targets": "Salesperson / Admin", "text": "A long-standing customer furiously demands a refund far above your approval limit and threatens to ‘post about it everywhere’ if you don’t act now. Their grievance may well be genuine.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You approve the large refund on the spot — well beyond your authority.", "deltas": {"M": -20, "X": 15}}, "VERIFY": {"text": "You confirm the order details — useful, but the sticking point is the amount, not the facts.", "deltas": {"X": 5}}, "REPORT": {"text": "This isn’t a security report; it’s an authority and service call.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You bring in a manager who can actually authorise that amount. Right move.", "deltas": {"R": 5}}}, "best": "ESCALATE (it’s above your limit)", "bestDecision": "ESCALATE", "learn": "Requests beyond your authority — especially with pressure or threats attached — go to someone who can actually decide."}, {"id": 40, "category": "DEVICE", "categoryLabel": "Devices & Tech", "color": "#0f766e", "type": "Offboarding Exception", "title": "The Ghost Account", "targets": "IT / Developer", "text": "A manager asks you (in IT) to keep a just-departed employee’s login active ‘for a little while’ so the team can reach their files — skipping the normal offboarding.", "legitimacy": "ambiguous", "outcomes": {"TRUST": {"text": "You leave the account live. A departed user’s access lingers as a standing risk.", "deltas": {"S": -20, "X": 15}}, "VERIFY": {"text": "You confirm the manager really asked — but the issue is the policy exception, not who asked.", "deltas": {"X": 5}}, "REPORT": {"text": "It’s not a phishing report; it’s an offboarding decision.", "deltas": {"X": 5}}, "ESCALATE": {"text": "You route it to security / HR for a proper data-handover and offboarding decision.", "deltas": {"S": 10}}}, "best": "ESCALATE (offboarding is a security/HR call)", "bestDecision": "ESCALATE", "learn": "Offboarding exceptions are a security and HR decision — escalate rather than quietly keeping ghost accounts alive."}], "roles": [{"name": "Receptionist / Front Desk", "color": "#8a5a2b", "description": "The first point of contact for every visitor, call and delivery.", "targetedBy": "Tailgating, suspicious visitors, phone scams.", "ability": "Gatekeeper — once per game, auto-resolve any physical/visitor scenario as VERIFY (prevented)."}, {"name": "HR Manager", "color": "#b83280", "description": "Holds the personal data of everyone in the company.", "targetedBy": "Fake onboarding, data requests, payroll phishing.", "ability": "Records Lock — once per game, cancel one Reputation loss from a data-leak outcome."}, {"name": "Finance Officer", "color": "#b5292f", "description": "Controls payments — the prize attackers want most.", "targetedBy": "Invoice fraud, business-email compromise, deepfake transfer calls.", "ability": "Dual Control — once per game, force VERIFY on a money scenario (no Funds lost that round)."}, {"name": "CEO / Executive", "color": "#1e5fa8", "description": "High authority and a public profile — often the person attackers impersonate.", "targetedBy": "Impersonation and deepfakes (as the faked person), targeted phishing.", "ability": "Set the Tone — once per game, reduce the team’s Stress by 10."}, {"name": "Intern / New Hire", "color": "#0f766e", "description": "Eager to help and still learning what’s normal.", "targetedBy": "Pressure tactics, onboarding scams, oversharing online.", "ability": "Beginner’s Question — once per game, ask the facilitator one yes/no question before deciding."}, {"name": "IT / Developer", "color": "#6b3fa0", "description": "Keeps the systems running and is trusted with access.", "targetedBy": "Vishing (‘IT support’), malicious files, shadow IT.", "ability": "Patch It — once per game, turn one REPORT into a guaranteed ‘attack prevented.’"}, {"name": "Salesperson", "color": "#c2710c", "description": "Always on the move, with lots of external contact and devices.", "targetedBy": "Public Wi-Fi, lost devices, QR scams.", "ability": "Road Warrior — once per game, ignore one Stress penalty."}], "events": [{"title": "Phishing Wave", "channel": "EMAIL", "channelLabel": "Email & Messages", "color": "#1e5fa8", "text": "A phishing wave floods inboxes. For the next 3 incidents, a wrong answer on an Email & Messages card costs double.", "effect": {"kind": "amplify", "mult": 2, "duration": 3}}, {"title": "Finance Under Fire", "channel": "MONEY", "channelLabel": "Money & Payments", "color": "#b5292f", "text": "Fraudsters are hammering finance. For the next 3 incidents, a wrong answer on a Money & Payments card costs double.", "effect": {"kind": "amplify", "mult": 2, "duration": 3}}, {"title": "Scam-Call Run", "channel": "VOICE", "channelLabel": "Phone & Voice", "color": "#6b3fa0", "text": "A run of convincing scam calls. For the next 3 incidents, a wrong answer on a Phone & Voice card costs double.", "effect": {"kind": "amplify", "mult": 2, "duration": 3}}, {"title": "Visitor Day", "channel": "PHYSICAL", "channelLabel": "Physical & In-Person", "color": "#8a5a2b", "text": "The building is full of strangers. For the next 3 incidents, a wrong answer on a Physical card costs double.", "effect": {"kind": "amplify", "mult": 2, "duration": 3}}, {"title": "Patch Backlog", "channel": "DEVICE", "channelLabel": "Devices & Tech", "color": "#0f766e", "text": "Systems are behind on updates. For the next 3 incidents, a wrong answer on a Devices & Tech card costs double.", "effect": {"kind": "amplify", "mult": 2, "duration": 3}}, {"title": "In the Spotlight", "channel": "SOCIAL", "channelLabel": "Social & Online", "color": "#b83280", "text": "The brand is trending and watched. For the next 3 incidents, a wrong answer on a Social & Online card costs double.", "effect": {"kind": "amplify", "mult": 2, "duration": 3}}, {"title": "Conference Season", "channel": "MOBILE", "channelLabel": "On the Go", "color": "#c2710c", "text": "Half the team is on the road. For the next 3 incidents, a wrong answer on an On-the-Go card costs double.", "effect": {"kind": "amplify", "mult": 2, "duration": 3}}, {"title": "Awareness Training Done", "channel": null, "channelLabel": null, "color": "#1e3a5f", "text": "Reward: Security +10 and Stress −5.", "effect": {"kind": "meter", "deltas": {"S": 10, "X": -5}}}, {"title": "Audit Week", "channel": null, "channelLabel": null, "color": "#1e3a5f", "text": "For the next 3 incidents, a correct answer earns +5 extra Security.", "effect": {"kind": "reward_best", "amount": 5, "duration": 3}}, {"title": "Budget Approved", "channel": null, "channelLabel": null, "color": "#1e3a5f", "text": "Reward: Funds +15.", "effect": {"kind": "meter", "deltas": {"M": 15}}}, {"title": "A Calm Stretch", "channel": null, "channelLabel": null, "color": "#1e3a5f", "text": "Reward: Stress −10.", "effect": {"kind": "meter", "deltas": {"X": -10}}}, {"title": "Board Review", "channel": null, "channelLabel": null, "color": "#1e3a5f", "text": "Leadership is under scrutiny: Reputation −10.", "effect": {"kind": "meter", "deltas": {"R": -10}}}]};</script>
<script>
(function(){
  const $ = (id)=>document.getElementById(id);
  const stage=$("stage"), hud=$("hud"), topbar=$("topbar"),
        counter=$("counter"), modePill=$("modePill"), foot=$("foot");
  const M = GAME.meters, MK = ["R","M","S","X"];
  const N = GAME.meta.incidentsPerGame;
  let state = null;

  // ---------- helpers ----------
  function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
  function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
  function fmt(key,v){const m=M[key];return (m.prefix||"")+v+(m.unit||"");}

  // Build a round that uses every decision as the right answer at least once,
  // and caps any single best-decision so no one card (e.g. VERIFY) dominates.
  function buildDeck(){
    const all = GAME.scenarios, SIZE = Math.min(N, all.length), CAP = Math.max(3, Math.round(SIZE/4));
    const byBest = {};
    all.forEach(s => { (byBest[s.bestDecision] = byBest[s.bestDecision] || []).push(s); });
    const pick = [], used = new Set(), count = {};
    // one of each best-decision first (guarantees all four get used)
    shuffle(Object.keys(byBest)).forEach(b => {
      if (pick.length >= SIZE) return;
      const s = shuffle(byBest[b]).find(x => !used.has(x.id));
      if (s) { pick.push(s); used.add(s.id); count[b] = (count[b]||0) + 1; }
    });
    // fill the rest, respecting the per-decision cap
    for (const s of shuffle(all.filter(x => !used.has(x.id)))) {
      if (pick.length >= SIZE) break;
      if ((count[s.bestDecision]||0) < CAP) { pick.push(s); used.add(s.id); count[s.bestDecision] = (count[s.bestDecision]||0) + 1; }
    }
    // last resort if caps left us short
    for (const s of shuffle(all.filter(x => !used.has(x.id)))) {
      if (pick.length >= SIZE) break; pick.push(s); used.add(s.id);
    }
    return shuffle(pick);
  }

  function meterColor(key,v){
    const m=M[key];
    if(m.higherIsBetter){ if(v<=m.crit)return"bad"; if(v<=m.warn)return"warn"; return"good"; }
    else { if(v>=m.crit)return"bad"; if(v>=m.warn)return"warn"; return"good"; }
  }

  // ---------- HUD ----------
  function buildHUD(){
    hud.innerHTML = MK.map(k=>{
      const m=M[k];
      return `<div class="meter" id="meter-${k}">
        <div class="top"><span class="nm">${m.short}</span>
          <span><span class="val" id="val-${k}">0</span><span class="max"> /${m.max}</span></span></div>
        <div class="track"><div class="fill" id="fill-${k}"></div></div></div>`;
    }).join("");
  }
  function renderMeters(animate){
    MK.forEach(k=>{
      const v=state.meters[k], m=M[k];
      const pct=clamp((v-m.min)/(m.max-m.min)*100,0,100);
      const fill=$("fill-"+k), val=$("val-"+k);
      fill.style.width=pct+"%";
      fill.className="fill "+meterColor(k,v);
      val.textContent=fmt(k,v);
    });
  }
  function countTo(key,from,to){
    const el=$("val-"+key); if(!el)return;
    const dur=600, t0=performance.now();
    function step(t){const p=Math.min(1,(t-t0)/dur);
      const v=Math.round(from+(to-from)*(1-Math.pow(1-p,3)));
      el.textContent=fmt(key,v); if(p<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);
  }

  function applyDeltas(deltas){
    if(!deltas)return;
    Object.keys(deltas).forEach(k=>{
      const m=M[k], from=state.meters[k];
      const to=clamp(from+deltas[k],m.min,m.max);
      state.meters[k]=to;
      const fill=$("fill-"+k);
      if(fill){fill.style.width=clamp((to-m.min)/(m.max-m.min)*100,0,100)+"%";fill.className="fill "+meterColor(k,to);}
      countTo(k,from,to);
      const mt=$("meter-"+k); if(mt){mt.classList.remove("flash");void mt.offsetWidth;mt.classList.add("flash");}
    });
  }

  function deltaChips(deltas){
    if(!deltas||!Object.keys(deltas).length) return `<span class="delta flat">no change</span>`;
    const order=[["S","Sec"],["R","Rep"],["M","Funds"],["X","Stress"]];
    return order.filter(([k])=>deltas[k]!=null&&deltas[k]!==0).map(([k,lbl])=>{
      const v=deltas[k], up=v>0, good=M[k].higherIsBetter?up:!up;
      const unit=M[k].unit||"";
      return `<span class="delta ${good?"good":"bad"}">${lbl} ${up?"+":"\u2212"}${Math.abs(v)}${unit}</span>`;
    }).join("");
  }

  // ---------- screens ----------
  function showStart(){
    topbar.style.display="none"; hud.style.display="none";
    document.body.classList.remove("facilitator");
    const leg = MK.map(k=>`<span><b>${M[k].label}</b> ${M[k].hint.split(".")[0]}</span>`).join("");
    stage.innerHTML = `
      <div class="hero">
        <div class="eyebrow">Cyber-awareness \u00b7 card game</div>
        <h1>HUMAN <span class="fw">FIREWALL</span></h1>
        <div class="sub">${N} everyday incidents. ${GAME.decisions.length} ways to react. Keep the company standing.</div>
        <div class="modes">
          <button class="modebtn" data-mode="solo">
            <span class="ic">\u25b6</span>
            <span><span class="t">Play solo</span><br><span class="d">Train at your own pace and get a score.</span></span>
          </button>
          <button class="modebtn" data-mode="multiplayer">
            <span class="ic">\u2687</span>
            <span><span class="t">Play as a team</span><br><span class="d">Pass &amp; play \u2014 take turns, share the meters.</span></span>
          </button>
          <button class="modebtn" data-mode="facilitator">
            <span class="ic">\u2318</span>
            <span><span class="t">Run a workshop</span><br><span class="d">A facilitator screen for a team or a room.</span></span>
          </button>
        </div>
        <div class="legend">${leg}</div>
      </div>`;
    foot.textContent = GAME.scenarios.length+" scenarios \u00b7 "+GAME.events.length+" event cards";
    stage.querySelectorAll(".modebtn").forEach(b=>b.onclick=()=>{
      if(b.dataset.mode==="multiplayer") showSetup(); else startGame(b.dataset.mode);
    });
  }

  // ---------- team setup ----------
  function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}
  function showSetup(){
    topbar.style.display="none"; hud.style.display="none"; foot.textContent="";
    document.body.classList.remove("facilitator");
    let names=["",""];
    function render(){
      const rows=names.map((n,i)=>`
        <div class="roster-row">
          <span class="rn mono">${i+1}</span>
          <input class="pinput" data-i="${i}" maxlength="20" placeholder="Player ${i+1}" value="${esc(n)}" aria-label="Player ${i+1} name"${i===0?" autofocus":""}>
          <button class="rrm" data-rm="${i}"${names.length<=2?" disabled":""} aria-label="Remove player ${i+1}">\u00d7</button>
        </div>`).join("");
      const canStart = names.map(s=>s.trim()).filter(Boolean).length>=2;
      stage.innerHTML=`
        <div class="hero setup">
          <div class="eyebrow">Team mode \u00b7 pass &amp; play</div>
          <h1>Who\u2019s playing?</h1>
          <div class="sub">Add 2\u20136 players. You\u2019ll take turns deciding \u2014 one incident each, in order. The meters are shared, so you win or lose as a team.</div>
          <div class="roster">${rows}</div>
          <button class="btn ghost addp" id="addp"${names.length>=6?" disabled":""}>+ Add player</button>
          <div class="actions">
            <button class="btn primary" id="startgame"${canStart?"":" disabled"}>Start game</button>
            <button class="btn ghost" id="backbtn">Back</button>
          </div>
        </div>`;
      function clean(){return names.map(s=>s.trim()).filter(Boolean);}
      function go(){const c=clean(); if(c.length>=2) startGame("multiplayer", c);}
      stage.querySelectorAll(".pinput").forEach(inp=>{
        inp.oninput=()=>{ names[+inp.dataset.i]=inp.value; $("startgame").disabled=clean().length<2; };
        inp.onkeydown=(e)=>{ if(e.key==="Enter") go(); };
      });
      stage.querySelectorAll(".rrm").forEach(b=>b.onclick=()=>{ if(names.length>2){ names.splice(+b.dataset.rm,1); render(); } });
      $("addp").onclick=()=>{ if(names.length<6){ names.push(""); render(); } };
      $("startgame").onclick=go;
      $("backbtn").onclick=showStart;
    }
    render();
  }

  function startGame(mode, names){
    const players=(names||[]).map(n=>({name:n, correct:0, wrong:0}));
    state={mode, incident:1, meters:{}, deck:buildDeck(), eventUsed:false, activeMod:null, activeReward:null, players};
    MK.forEach(k=>state.meters[k]=M[k].start);
    document.body.classList.toggle("facilitator", mode==="facilitator");
    topbar.style.display="flex"; hud.style.display="grid";
    modePill.textContent = mode==="facilitator"?"FACILITATOR":(mode==="multiplayer"?"TEAM":"SOLO");
    buildHUD(); renderMeters(false);
    showScenario();
  }

  function curScenario(){return state.deck[state.incident-1];}
  // Round-robin: who decides the current incident (multiplayer only).
  function curPlayerIndex(){ const p=state.players; return (p&&p.length)?(state.incident-1)%p.length:-1; }
  function curPlayerName(){ const i=curPlayerIndex(); return i>=0?state.players[i].name:null; }

  function showScenario(){
    counter.innerHTML = `INCIDENT <b>${String(state.incident).padStart(2,"0")}</b> / ${N}`;
    const s=curScenario();
    const who = state.mode==="multiplayer" ? curPlayerName() : null;
    const prompt = state.mode==="facilitator"
      ? "The team decides \u2014 play one card."
      : (who ? who+", what do you do?" : "What do you do?");
    const decs = GAME.decisions.filter(d=>s.outcomes[d.name]).map((d,i)=>`
      <button class="dec" data-dec="${d.name}" style="--dc:${d.color}">
        <span class="k">${i+1}</span>
        <span class="nm">${d.name}</span>
        <span class="mn">${d.meaning}</span>
      </button>`).join("");
    const facTools = state.mode==="facilitator" && !state.eventUsed ? `
      <div class="fac-tools"><button class="btn" id="drawEvent">Draw an event card</button></div>` : "";
    let banner="";
    if(modActive(state.activeMod))
      banner=`<div class="evbanner" style="border-color:${state.activeMod.color}"><b>${state.activeMod.label}</b> \u2014 wrong answers on ${state.activeMod.channelLabel} cost \u00d7${state.activeMod.mult} (through incident ${state.activeMod.until}).</div>`;
    else if(modActive(state.activeReward))
      banner=`<div class="evbanner" style="border-color:var(--good)"><b>${state.activeReward.label}</b> \u2014 correct answers earn +${state.activeReward.amount} Security (through incident ${state.activeReward.until}).</div>`;
    const turnBanner = who ? `<div class="turnbanner"><span class="who">${esc(who)}</span><span class="up">it\u2019s your call</span></div>` : "";
    stage.innerHTML = `
      ${turnBanner}${banner}
      <div class="card">
        <span class="tag" style="background:${s.color}">${s.categoryLabel}</span>
        <div class="targets">Targets: ${s.targets}</div>
        <h2 class="scenario-title">${s.title}</h2>
        <p class="scenario-text">${s.text}</p>
        <p class="prompt">${prompt}</p>
        <div class="decisions">${decs}</div>
        ${facTools}
        <div id="eventSlot"></div>
      </div>`;
    stage.querySelectorAll(".dec").forEach(b=>b.onclick=()=>choose(b.dataset.dec));
    const de=$("drawEvent"); if(de) de.onclick=drawEvent;
  }

  function amplify(deltas, mult){
    const out={};
    for(const k in deltas){ const v=deltas[k]; const bad=(k!=="X")?v<0:v>0;
      out[k]= bad ? v*mult : v; }
    return out;
  }
  function modActive(m){ return m && state.incident<=m.until; }

  function drawEvent(){
    const ev = GAME.events[Math.random()*GAME.events.length|0];
    state.eventUsed=true;
    const slot=$("eventSlot");
    const ef=ev.effect;
    let actionHTML;
    if(ef.kind==="meter") actionHTML=`<button class="btn primary" id="applyEvent">Apply effect</button>`;
    else if(ef.kind==="amplify") actionHTML=`<button class="btn primary" id="applyEvent">Start the wave</button>`;
    else actionHTML=`<button class="btn primary" id="applyEvent">Begin</button>`;
    slot.innerHTML = `<div class="event-pop" style="border-left-color:${ev.color}">
        <div class="et" style="color:${ev.channel?ev.color:'var(--warn)'}">${ev.channelLabel||'Event'}</div>
        <div class="en">${ev.title}</div>
        <div class="ex">${ev.text}</div><div class="ea">${actionHTML}</div></div>`;
    const ft=$("drawEvent"); if(ft)ft.parentElement.remove();
    const ab=$("applyEvent"); if(!ab) return;
    ab.onclick=()=>{
      if(ef.kind==="meter"){ applyDeltas(ef.deltas); }
      else if(ef.kind==="amplify"){ state.activeMod={channel:ev.channel,channelLabel:ev.channelLabel,color:ev.color,label:ev.title,mult:ef.mult,until:state.incident+ef.duration-1}; }
      else if(ef.kind==="reward_best"){ state.activeReward={amount:ef.amount,label:ev.title,until:state.incident+ef.duration-1}; }
      ab.outerHTML='<span class="mn" style="color:var(--good);font-size:13px">Applied.</span>';
      checkCrash();
    };
  }

  function choose(dec){
    const s=curScenario(), o=s.outcomes[dec], d=GAME.decisions.find(x=>x.name===dec);
    // In multiplayer, tally this incident against whoever's turn it is.
    if(state.mode==="multiplayer"){ const i=curPlayerIndex(); if(i>=0){ if(dec===s.bestDecision) state.players[i].correct++; else state.players[i].wrong++; } }
    let deltas=o.deltas, notes="";
    if(modActive(state.activeMod) && s.category===state.activeMod.channel && dec!==s.bestDecision){
      deltas=amplify(deltas, state.activeMod.mult);
      notes+=`<div class="ampnote bad">\u26a0 ${state.activeMod.label}: wrong-answer penalty \u00d7${state.activeMod.mult}</div>`;
    }
    if(modActive(state.activeReward) && dec===s.bestDecision){
      deltas=Object.assign({}, deltas); deltas.S=(deltas.S||0)+state.activeReward.amount;
      notes+=`<div class="ampnote good">\u2713 ${state.activeReward.label}: +${state.activeReward.amount} Security for a correct call</div>`;
    }
    applyDeltas(deltas);
    const last = state.incident>=N;
    const vmap={malicious:["mal","This was an attack"],legitimate:["leg","This was legitimate"],ambiguous:["amb","A judgment call"]};
    const vt=vmap[s.legitimacy]||vmap.malicious;
    stage.innerHTML = `
      <div class="card">
        <div class="vtag ${vt[0]}">${vt[1]}</div>
        <div class="chosen">You chose \u00b7 <b style="--dc:${d.color};color:${d.color}">${dec}</b></div>
        <p class="outcome-text">${o.text}</p>
        <div class="deltas">${deltaChips(deltas)}</div>
        ${notes}
        <div class="note best"><b>Best move:</b> ${s.best}</div>
        <div class="note learn"><b>Learn:</b> ${s.learn}</div>
        <div class="actions">
          <button class="btn primary" id="next">${last?"See result":"Next incident"}</button>
        </div>
      </div>`;
    $("next").onclick=()=>{ if(checkCrash())return; advance(); };
  }

  function crashedMeter(){
    for(const k of MK){ const m=M[k], v=state.meters[k];
      if(m.higherIsBetter && v<=m.min) return k;
      if(!m.higherIsBetter && v>=m.max) return k;
    } return null;
  }
  function checkCrash(){ const k=crashedMeter(); if(k){ endGame(false,k); return true;} return false; }

  function advance(){
    if(state.incident>=N){ endGame(true,null); return; }
    state.incident++; state.eventUsed=false; showScenario();
  }

  function ratingFor(sec){ for(const r of GAME.ratings) if(sec>=r.min) return r; return GAME.ratings[GAME.ratings.length-1]; }

  function endGame(survived, crashKey){
    counter.innerHTML="";
    const mt=state.meters;
    let won = survived;
    let reason="";
    if(!survived){
      const names={R:"reputation hit zero \u2014 the company's name is ruined",
                   M:"funds hit zero \u2014 the company is bankrupt",
                   S:"security hit zero \u2014 the company is wide open",
                   X:"stress hit the limit \u2014 the team burned out"};
      reason = "Breach: "+names[crashKey]+".";
      won=false;
    } else {
      const lines=[]; MK.forEach(k=>{ const m=M[k];
        const ok = m.higherIsBetter ? mt[k]>=m.winLine : mt[k]<=m.winLine;
        if(!ok) lines.push(m.label.toLowerCase());
      });
      if(lines.length){ won=false; reason="You made it through all "+N+" incidents, but "+lines.join(" and ")+" finished in the danger zone."; }
      else { reason="You cleared all "+N+" incidents with every meter in safe territory. That's a human firewall."; }
    }
    const rt = ratingFor(mt.S);
    const stars = won ? "\u2605".repeat(rt.stars)+"\u2606".repeat(3-rt.stars) : "\u2606\u2606\u2606";
    const finals = MK.map(k=>`<div class="fm"><div class="n">${M[k].short}</div><div class="v" style="color:var(--${meterColor(k,mt[k])})">${fmt(k,mt[k])}</div></div>`).join("");
    let scoreboard="";
    if(state.players && state.players.length){
      const ranked=state.players.slice().sort((a,b)=>b.correct-a.correct);
      const top=ranked.length?ranked[0].correct:0;
      const rows=ranked.map(p=>{
        const calls=p.correct+p.wrong, mvp=top>0&&p.correct===top;
        return `<div class="sb-row"><span class="sb-name">${mvp?"👑 ":""}${esc(p.name)}</span><span class="sb-score mono">${p.correct}/${calls} correct</span></div>`;
      }).join("");
      scoreboard=`<div class="scoreboard"><h3>Team scoreboard</h3>${rows}</div>`;
    }
    stage.innerHTML = `
      <div class="card verdict">
        <div class="stars" style="color:${won?"var(--good)":"var(--bad)"}">${stars}</div>
        <h2>${won?"Company secured":"Company breached"}</h2>
        <div class="rk">${won?rt.label:"incident response required"}</div>
        <p class="reason">${reason}</p>
        <div class="final">${finals}</div>
        ${scoreboard}
        <div class="actions">
          <button class="btn primary" id="again">Play again</button>
          <button class="btn ghost" id="home">Switch mode</button>
        </div>
      </div>`;
    $("again").onclick=()=>startGame(state.mode, state.players?state.players.map(p=>p.name):[]);
    $("home").onclick=showStart;
  }

  // keyboard 1-4 to choose during a scenario
  document.addEventListener("keydown",e=>{
    if(!state||state.mode==null)return;
    const n=parseInt(e.key,10);
    if(n>=1&&n<=4){ const b=stage.querySelectorAll(".dec")[n-1]; if(b)b.click(); }
  });

  showStart();
})();
</script>
</body>
</html>
